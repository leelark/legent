- fix_order: 1
  priority: Critical
  layer_module: Infra
  file_names:
    - infrastructure/kubernetes/base/deployments/frontend.yml
    - infrastructure/kubernetes/ingress/ingress.yml
    - docker-compose.yml
  issue_category: Config
  short_description: Frontend missing in Kubernetes while referenced by ingress
  technical_details: >
    Ingress routes traffic to a frontend service that is not defined in Kubernetes manifests,
    while docker-compose defines it. This creates environment inconsistency and broken routing.
  impacted_flow: UI access, browser entrypoint, all frontend features in Kubernetes
  root_cause: Missing Deployment and Service definitions for frontend in Kubernetes
  fix_recommendation: >
    Add frontend Deployment and Service, align ports and service names with docker-compose,
    and update ingress to reference correct service
  dependency_impact: Ingress, frontend image, service discovery, environment parity
  risk_if_not_fixed: Application UI inaccessible in Kubernetes deployments

- fix_order: 2
  priority: Critical
  layer_module: Infra
  file_names:
    - infrastructure/kubernetes/base/secrets.yml
    - infrastructure/kubernetes/base/configmap.yml
    - docker-compose.yml
    - services/*/src/main/resources/application.yml
  issue_category: Security
  short_description: Hardcoded credentials and secrets across configs
  technical_details: >
    Plaintext DB passwords, JWT secrets, and service credentials are embedded across
    YAML files and Spring configs, with fallback defaults.
  impacted_flow: Authentication, DB access, service startup, security
  root_cause: No centralized secret management and reliance on defaults
  fix_recommendation: >
    Move all secrets to environment variables or Kubernetes Secrets, remove defaults,
    enforce required config validation at startup
  dependency_impact: All services, DB connections, auth flows
  risk_if_not_fixed: Credential leakage, security breach, inconsistent environments

- fix_order: 3
  priority: Critical
  layer_module: BE
  file_names:
    - services/foundation-service/src/main/java/com/legent/foundation/config/OpenSearchConfig.java
    - services/foundation-service/src/main/resources/application.yml
    - infrastructure/kubernetes/base/configmap.yml
  issue_category: Missing
  short_description: OpenSearch dependency enabled without deployment
  technical_details: >
    Search is enabled but OpenSearch service is not deployed in Kubernetes,
    fallback points to localhost causing failures
  impacted_flow: Search APIs, admin search, content discovery
  root_cause: Misalignment between feature flag and infrastructure
  fix_recommendation: >
    Disable search by default or provision OpenSearch and inject endpoint via env
  dependency_impact: Search controllers, config maps, service startup
  risk_if_not_fixed: Service startup failure or broken search features

- fix_order: 4
  priority: Critical
  layer_module: Shared
  file_names:
    - shared/legent-security/src/main/java/com/legent/security/TenantFilter.java
    - services/identity-service/src/main/resources/application.yml
  issue_category: Security
  short_description: Tenant filter blocks login endpoint
  technical_details: >
    TenantFilter does not whitelist login route (/api/v1/auth/**) causing
    authentication requests to fail before reaching auth layer
  impacted_flow: Login, authentication, session creation
  root_cause: Misaligned whitelist configuration
  fix_recommendation: >
    Add login endpoints to whitelist and centralize public route config
  dependency_impact: Auth service, frontend login, security filters
  risk_if_not_fixed: Users unable to log in

