    - id: "LEGENT-CRIT-001"
      fix_order: 1
      priority: "Critical"
      layer: "Security"
      module: "shared/legent-security"
      files:
        - "shared/legent-security/src/main/java/com/legent/security/JwtTokenProvider.java:31-35"
      issue_type: "Security Vulnerability"
      title: "JWT Secret Key Without Minimum Length Validation"
      description: |
        JWT signing key accepts any length secret. Secrets shorter than 256 bits 
        result in weak HMAC-SHA256 signatures vulnerable to brute force attacks.
      technical_details: |
        - Keys.hmacShaKeyFor() at line 33 accepts any byte length
        - HMAC-SHA256 requires >= 32 bytes for security
        - No validation in constructor
      impacted_flow: |
        Authentication → Token Generation → All API Access → Potential Bypass
      root_cause: |
        Missing runtime validation of JWT secret length.
      fix_recommendation: |
        Add validation in JwtTokenProvider constructor:
        ```java
        byte[] secretBytes = secret.getBytes(StandardCharsets.UTF_8);
        if (secretBytes.length < 32) {
            throw new IllegalArgumentException(
                "JWT secret must be at least 256 bits (32 bytes), got: " + secretBytes.length);
        }
        ```
      risk_if_not_fixed: |
        Authentication bypass, session hijacking, complete system compromise
      
    - id: "LEGENT-CRIT-002"
      fix_order: 2
      priority: "Critical"
      layer: "Security"
      module: "shared/legent-security"
      files:
        - "shared/legent-security/src/main/java/com/legent/security/TenantContext.java:17-18"
        - "services/automation-service/src/main/java/com/legent/automation/service/WorkflowEngine.java:64-66"
      issue_type: "Memory Leak / Data Isolation"
      title: "ThreadLocal Tenant Context Leaks in Async Operations"
      description: |
        TenantContext uses ThreadLocal without automatic cleanup in async contexts.
        Thread pool reuse causes tenant data to leak between requests/workflows.
      technical_details: |
        - ThreadLocal.set() without guaranteed cleanup in async contexts
        - WorkflowEngine @Async operations don't clear ThreadLocal
        - DeliveryEventConsumer properly clears in finally block (good example)
      impacted_flow: |
        Async Workflow → Thread Pool Reuse → Wrong Tenant Context → Cross-Tenant Data Access
      root_cause: |
        No automatic cleanup mechanism for ThreadLocal in async executors.
      fix_recommendation: |
        1. Implement TaskDecorator for async executors:
        ```java
        @Bean("workflowExecutor")
        public Executor workflowExecutor() {
            ThreadPoolTaskExecutor executor = new ThreadPoolTaskExecutor();
            executor.setTaskDecorator(runnable -> () -> {
                String tenantId = TenantContext.getTenantId();
                try {
                    runnable.run();
                } finally {
                    TenantContext.clear();
                }
            });
            return executor;
        }
        ```
      risk_if_not_fixed: |
        Cross-tenant data leaks, GDPR violations, data privacy breaches

    - id: "LEGENT-CRIT-003"
      fix_order: 3
      priority: "Critical"
      layer: "Backend"
      module: "services/delivery-service"
      files:
        - "services/delivery-service/src/main/java/com/legent/delivery/service/DeliveryOrchestrationService.java:313-361"
      issue_type: "Scalability / Resource Exhaustion"
      title: "Content-Service HTTP Client Without Connection Pooling"
      description: |
        fetchContentFromContentService() creates new HttpURLConnection per call.
        High volume email retries exhaust ephemeral ports (16K limit on most systems).
      technical_details: |
        - Line 322: HttpURLConnection created per retry attempt
        - No connection reuse or pooling
        - 5-second timeouts only
        - No retry logic for transient failures
      impacted_flow: |
        Email Retry Scheduled → Content Fetch → Port Exhaustion → Service Failure
      root_cause: |
        Using low-level HttpURLConnection instead of pooled WebClient.
      fix_recommendation: |
        Replace with WebClient connection pooling:
        ```java
        @Component
        public class ContentServiceClient {
            private final WebClient webClient;
            public ContentServiceClient(@Value(...) String baseUrl) {
                this.webClient = WebClient.builder()
                    .baseUrl(baseUrl)
                    .clientConnector(new ReactorClientHttpConnector(
                        HttpClient.create()
                            .option(ChannelOption.CONNECT_TIMEOUT_MILLIS, 5000)
                            .responseTimeout(Duration.ofSeconds(5))
                    ))
                    .build();
            }
        }
        ```
      risk_if_not_fixed: |
        Email retry failures at scale, port exhaustion, complete delivery halt

    - id: "LEGENT-CRIT-004"
      fix_order: 4
      priority: "Critical"
      layer: "Data Consistency"
      module: "services/tracking-service"
      files:
        - "services/tracking-service/src/main/java/com/legent/tracking/service/TrackingIngestionService.java:46-56"
        - "services/tracking-service/src/main/java/com/legent/tracking/service/TrackingIngestionService.java:59-75"
      issue_type: "Eventual Consistency Violation"
      title: "Tracking Events Published Outside Transaction (Outbox Pattern Inconsistency)"
      description: |
        processClick and processConversion publish Kafka events directly without 
        transactional outbox. DB rollback leaves orphaned Kafka events.
      technical_details: |
        - processOpen uses outbox pattern (lines 40-43)
        - processClick publishes directly at line 56
        - processConversion publishes directly at line 74
        - Inconsistent implementation across similar methods
      impacted_flow: |
        Tracking Event → DB Save + Kafka Publish → Transaction Rollback → Orphaned Kafka Event
      root_cause: |
        Inconsistent application of transactional outbox pattern.
      fix_recommendation: |
        Standardize all methods to use publishEventWithOutbox() wrapper.
      risk_if_not_fixed: |
        Data inconsistency between ClickHouse and Kafka streams

    - id: "LEGENT-CRIT-005"
      fix_order: 5
      priority: "Critical"
      layer: "Performance"
      module: "services/platform-service"
      files:
        - "services/platform-service/src/main/java/com/legent/platform/service/WebhookRetryService.java:52-64"
      issue_type: "Performance Bottleneck"
      title: "Webhook Retry Sequential Processing - No Parallelism"
      description: |
        @Scheduled method processes retries sequentially. Slow endpoints 
        block all other retries. Queue buildup under load.
      technical_details: |
        - Sequential for-loop at lines 61-63
        - 30-second fixedDelay timer
        - 10-second timeout per attempt
        - Max ~3 retries per 30-second window
      impacted_flow: |
        Webhook Failure → Retry Queue → Sequential Processing → SLA Violation
      root_cause: |
        No parallel processing or worker pool for webhook retries.
      fix_recommendation: |
        Implement parallel processing with @Async:
        ```java
        @Scheduled(fixedDelay = 30000)
        public void processRetries() {
            List<WebhookRetry> pending = retryRepository.findPendingRetries(Instant.now());
            pending.parallelStream()
                .limit(10)
                .forEach(this::processRetryAsync);
        }
        ```
      risk_if_not_fixed: |
        Webhook delivery delays, downstream integration failures

