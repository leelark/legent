      issue_type: "Transaction Boundary"
      title: "Bulk Upsert All-or-Nothing Transaction Risk"
      description: |
        Bulk upsert saves each record individually but entire operation in one 
        transaction. Exception in one record rolls back all previous saves.
      technical_details: |
        - @Transactional at method level
        - Individual save() calls without intermediate flush
        - All-or-nothing behavior on any error
      impacted_flow: |
        CSV Import → Bulk Upsert → Single Error → All Data Lost
      root_cause: |
        Large transaction scope without chunking strategy.
      fix_recommendation: |
        Implement chunk-based processing (100 records per transaction).
      risk_if_not_fixed: |
        Import failures lose all progress, timeout on large imports

