    issue_type: LOGICAL_FLAW
    category: Architecture
    short_description: Foundation Service and Platform Service duplicate webhook dispatch, global search, and notification functionality — unclear ownership
    technical_details: >
      Both foundation-service and platform-service contain WebhookService/WebhookDispatcherService,
      GlobalSearchService, and notification functionality. Both services manage their own webhook_integrations
      tables. Both index documents in OpenSearch. Frontend has no clear path to know which service owns which
      functionality. API routes in nginx point /api/v1/platform to platform-service but foundation-service
      also handles webhook and search paths. Two webhook dispatch pipelines may both fire for the same event.
    impacted_flow: Webhook dispatch, search indexing, notification delivery
    root_cause: Feature ownership not established between two services during development
    fix_recommendation: >
      Merge Platform Service into Foundation Service, or clearly delineate: Foundation owns tenant provisioning,
      config, feature flags, audit. Platform owns webhook dispatch, notifications, OpenSearch indexing.
      Delete all duplicate code from the service that surrenders ownership.
    dependency_impact: Duplicate webhook dispatches to clients; inconsistent search indexes
    risk_if_not_fixed: Double webhook delivery; confusing API surface for consumers

  - fix_order: 30
    priority: MEDIUM
    layer: Backend — Tracking Service
    module: TrackingIngestionService (deduplication)
    file_names:
      - services/tracking-service/src/main/java/com/legent/tracking/service/TrackingIngestionService.java
    issue_type: LOGICAL_FLAW
    category: Data Integrity
    short_description: Deduplication key uses linkUrl.hashCode() — hash collisions can suppress legitimate distinct clicks
    technical_details: >
      isDuplicate() builds dedup key including url.hashCode() for click events. Java's String.hashCode() is a
      32-bit integer. Two different URLs that happen to produce the same hashCode (birthday collision, ~50%
      probability at ~65,536 URLs) would cause the second click to be silently dropped as a duplicate.
      MessageId-level dedup with a 2-hour window may also be too short if emails are opened hours after
      delivery.
    impacted_flow: Click deduplication accuracy
    root_cause: Integer hash used as a uniqueness component where full value is needed
    fix_recommendation: >
      Use the full URL in the deduplication key, URL-encoded or SHA-256 hashed (not Java hashCode).
      Example: track:dedup:{tenantId}:CLICK:{messageId}:{subscriberId}:{SHA256(url)}.
      Consider extending the dedup window to 7 days for click events.
    dependency_impact: Click deduplication false positives cause legitimate clicks to be discarded
    risk_if_not_fixed: Lost click events for URL pairs with hash collisions; inaccurate CTR metrics

  - fix_order: 31
    priority: MEDIUM
    layer: Backend — Delivery Service
    module: DeliveryOrchestrationService
    file_names:
      - services/delivery-service/src/main/java/com/legent/delivery/service/DeliveryOrchestrationService.java
    issue_type: PERFORMANCE_ISSUE
    category: Scalability
    short_description: message_logs stores full HTML email body in TEXT column — extreme row size at scale
    technical_details: >
      MessageLog.htmlBody is mapped to a TEXT column in message_logs. A typical marketing email HTML body is
      20-100KB. At 1,000,000 emails/day, this adds 20-100GB per day to the message_logs table. PostgreSQL TEXT
      columns above 8KB are stored in TOAST, causing random I/O on reads. The scheduled retry query fetches
      these rows with all fields, loading 20-100KB per retry candidate.
    impacted_flow: Database storage growth; retry processing performance
    root_cause: Full content stored for retry purposes instead of referencing the original template
    fix_recommendation: >
      Remove html_body and subject from message_logs. Store campaignId and templateId/version in the message
      log. At retry time, re-fetch the rendered content from Content Service using these references.
      Alternatively, store only a hash of the content for integrity checking.
    dependency_impact: message_logs table grows unboundedly; TOAST page fragmentation causes query slowdowns
    risk_if_not_fixed: 20-100GB/day storage growth; PostgreSQL I/O degradation within days of production launch

  - fix_order: 32
    priority: MEDIUM
    layer: Backend — Campaign Service
    module: SendExecutionService
    file_names:
      - services/campaign-service/src/main/java/com/legent/campaign/service/SendExecutionService.java
    issue_type: LOGICAL_FLAW
    category: Algorithm
    short_description: findBatchWithRetry uses Thread.sleep polling loop — blocking thread for up to 750ms
    technical_details: >
      findBatchWithRetry() retries up to 5 times with 150ms sleep between attempts. This is a busy-wait polling
      pattern that blocks a thread for up to 750ms. In a high-throughput scenario with thousands of batch events,
      this creates thread pool exhaustion. The retry also has no exponential backoff or terminal exception with
      context for debugging which batch was missing.
    impacted_flow: Batch processing throughput
    root_cause: Polling used to handle eventual consistency of batch DB write vs event consumption
    fix_recommendation: >
      Ensure batch is persisted (saved and flushed) before publishing the batch.created event. Use
      TransactionSynchronization.afterCommit() (BatchingService already does this) to publish only after DB
      commit. With this guarantee, findBatchWithRetry retry loop should be unnecessary. Remove it and replace
      with a simple findById + orElseThrow with a descriptive exception.
    dependency_impact: Thread pool exhaustion at high batch event rates
    risk_if_not_fixed: Delivery throughput degrades under load; potential thread starvation

  - fix_order: 33
    priority: LOW
    layer: Backend — Identity Service
    module: AuthService
    file_names:
      - services/identity-service/src/main/java/com/legent/identity/service/AuthService.java
    issue_type: NOT_IMPLEMENTED
    category: Functional Completeness
    short_description: No token refresh endpoint — users must re-login when JWT expires (86400000ms = 24h)
    technical_details: >
      JWT expiry is 24 hours. AuthController exposes /login and /signup only. There is no /refresh endpoint.
      Clients that hold an expired token receive 401 and are redirected to login by the frontend interceptor.
      For long-running sessions or background operations, token expiry causes unexpected 401 errors.
    impacted_flow: User session management
    root_cause: Refresh token flow not implemented
    fix_recommendation: >
      Implement a refresh token stored in an HTTP-only cookie or secure DB table. On access token expiry,
      client presents refresh token to receive a new access token without re-entering credentials.
    dependency_impact: User experience degradation; background sync operations fail
    risk_if_not_fixed: Users must re-login every 24 hours; long-running frontend sessions break

  - fix_order: 34
    priority: LOW
    layer: Backend — Automation Service
    module: WorkflowEngine
    file_names:
      - services/automation-service/src/main/java/com/legent/automation/service/WorkflowEngine.java
    issue_type: PARTIALLY_IMPLEMENTED
    category: Functional Completeness
    short_description: Workflow lookup in startWorkflow does not enforce tenant isolation on initial workflow fetch
    technical_details: >
      startWorkflow() calls workflowRepository.findById(workflowId) without a tenant_id filter. Any tenant
      could pass a workflowId belonging to another tenant (if they can guess or enumerate it). The subsequent
      definition lookup is tenant-filtered, but the initial workflow existence and status check is not.
    impacted_flow: Workflow execution tenant isolation
    root_cause: Missing tenant filter on workflow entity lookup
    fix_recommendation: >
      Replace workflowRepository.findById(workflowId) with
      workflowRepository.findByIdAndTenantId(workflowId, tenantId) and throw NotFoundException if absent.
    dependency_impact: Cross-tenant workflow visibility; potential cross-tenant automation execution
    risk_if_not_fixed: Tenant A can check the status of Tenant B's workflows

