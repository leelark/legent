  - fix_order: 36
    priority: LOW
    layer: Backend — All Services
    module: Observability
    file_names:
      - shared/legent-common/src/main/java/com/legent/common/config/CorrelationIdFilter.java
    issue_type: NOT_IMPLEMENTED
    category: Observability
    short_description: No distributed tracing configured — cross-service request correlation not possible beyond X-Correlation-Id header
    technical_details: >
      CorrelationIdFilter propagates X-Correlation-Id in HTTP headers. However, this correlation ID is not
      propagated through Kafka message headers, is not included in log MDC entries in all services consistently,
      and there is no distributed tracing backend (Jaeger, Zipkin, OpenTelemetry) configured anywhere.
      Debugging a failed email send requires manually correlating logs across campaign, audience, delivery,
      and tracking services by pattern-matching on IDs.
    impacted_flow: Operational debugging; incident response
    root_cause: Observability tooling not implemented
    fix_recommendation: >
      Add OpenTelemetry Java agent to all services. Configure OTLP export to Jaeger or Tempo.
      Add Kafka header propagation for trace context (W3C TraceContext). Include traceId in all log statements
      via MDC. Add Grafana dashboards for service-level throughput, error rate, and latency.
    dependency_impact: Debugging production incidents requires manual log correlation; MTTR increases significantly
    risk_if_not_fixed: Impossible to trace individual email delivery failures across services in production
