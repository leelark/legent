    - id: "LEGENT-CRIT-001"
      fix_order: 1
      priority: "Critical"
      layer: "Security"
      module: "shared/legent-security"
      files:
        - "shared/legent-security/src/main/java/com/legent/security/JwtTokenProvider.java:31-35"
        - "shared/legent-security/src/main/java/com/legent/security/JwtTokenProvider.java:33"
      issue_type: "Security Vulnerability"
      title: "JWT Secret Key Minimum Length Validation Missing"
      description: |
        JWT signing key is created from secret bytes without minimum length validation.
        Secrets shorter than 256 bits (32 bytes) produce weak HMAC-SHA256 signatures
        vulnerable to brute force attacks.
      technical_details: |
        Line 33: Keys.hmacShaKeyFor(secret.getBytes(StandardCharsets.UTF_8))
        - Accepts any byte length
        - HMAC-SHA256 requires >= 32 bytes for NIST compliance
        - No runtime validation of secret strength
        - Weak secrets allow JWT forgery
      code_snippet: |
        // CURRENT (VULNERABLE):
        this.signingKey = Keys.hmacShaKeyFor(secret.getBytes(StandardCharsets.UTF_8));
        
        // REQUIRED FIX:
        byte[] secretBytes = secret.getBytes(StandardCharsets.UTF_8);
        if (secretBytes.length < 32) {
            throw new IllegalArgumentException(
                "JWT secret must be at least 256 bits (32 bytes), got: " + secretBytes.length);
        }
        this.signingKey = Keys.hmacShaKeyFor(secretBytes);
      impacted_flow: |
        User Login → Token Generation → Weak Signature → JWT Forgery → Unauthorized Access
      root_cause: |
        Constructor accepts any secret length without validation.
        Relies on deployment configuration without runtime guards.
      fix_recommendation: |
        1. Add length validation in JwtTokenProvider constructor
        2. Add secret strength logging at startup
        3. Fail fast on weak secrets in production profile
      dependency_impact: |
        Affects ALL 10 services using JWT authentication
      risk_if_not_fixed: |
        CRITICAL: Authentication bypass, privilege escalation, complete system compromise
      validation_steps: |
        1. Test with 16-char secret - should throw exception
        2. Test with 32-char secret - should work
        3. Verify in all service startup logs

    - id: "LEGENT-CRIT-002"
      fix_order: 2
      priority: "Critical"
      layer: "Security"
      module: "shared/legent-security"
      files:
        - "shared/legent-security/src/main/java/com/legent/security/TenantContext.java:17-18"
        - "services/automation-service/src/main/java/com/legent/automation/service/WorkflowEngine.java:64-66"
        - "services/automation-service/src/main/java/com/legent/automation/service/WorkflowEngine.java:104-106"
      issue_type: "Memory Leak / Data Isolation"
      title: "ThreadLocal Tenant Context Leaks in Async Operations"
      description: |
        TenantContext uses ThreadLocal without guaranteed cleanup in async contexts.
        Thread pool thread reuse causes tenant data to leak between requests/workflows.
        A workflow for Tenant A could access data from Tenant B's previous execution.
      technical_details: |
        Line 17-18: ThreadLocal<String> CURRENT_TENANT = new ThreadLocal<>()
        - ThreadLocal.set() without guaranteed cleanup in @Async methods
        - WorkflowEngine uses @Async without clearing ThreadLocal
        - DeliveryEventConsumer properly clears in finally block (correct implementation)
        
        INCORRECT (WorkflowEngine):
        @Async("workflowExecutor")
        @Transactional
        public void startWorkflow(...) {
            // No try-finally, no cleanup
        }
        
        CORRECT (DeliveryEventConsumer):
        try {
            TenantContext.setTenantId(event.getTenantId());
            // process
        } finally {
            TenantContext.clear(); // Good!
        }
      impacted_flow: |
        Workflow Execution (Tenant A) → Thread Pool Reuse → 
        Workflow Execution (Tenant B) → TenantContext.getTenantId() returns "Tenant A" → 
        Cross-Tenant Data Access
      root_cause: |
        No automatic cleanup mechanism for ThreadLocal in async executors.
        Manual clear() required but not consistently implemented.
      fix_recommendation: |
        1. Implement TaskDecorator for all async executors:
        ```java
        @Bean("workflowExecutor")
        public Executor workflowExecutor() {
            ThreadPoolTaskExecutor executor = new ThreadPoolTaskExecutor();
            executor.setTaskDecorator(runnable -> () -> {
                try {
                    runnable.run();
                } finally {
                    TenantContext.clear();
                }
            });
            return executor;
        }
        ```
        2. Add try-finally to all @Async entry points
      dependency_impact: |
        automation-service (WorkflowEngine), any service using @Async
      risk_if_not_fixed: |
        CRITICAL: Cross-tenant data leaks, GDPR violations, data privacy breaches
      validation_steps: |
        1. Run concurrent workflows for different tenants
        2. Log TenantContext.getTenantId() at each step
        3. Verify no tenant leakage between executions

    - id: "LEGENT-CRIT-003"
      fix_order: 3
      priority: "Critical"
      layer: "Scalability"
      module: "services/delivery-service"
      files:
        - "services/delivery-service/src/main/java/com/legent/delivery/service/DeliveryOrchestrationService.java:313-361"
        - "services/delivery-service/src/main/java/com/legent/delivery/service/DeliveryOrchestrationService.java:315-361"
        - "services/delivery-service/src/main/java/com/legent/delivery/service/DeliveryOrchestrationService.java:320-326"
      issue_type: "Resource Exhaustion"
      title: "Content-Service HTTP Client Without Connection Pooling"
      description: |
        fetchContentFromContentService() creates new HttpURLConnection per retry call.
        High volume email retries exhaust ephemeral ports (16K limit on Linux).
        No connection reuse, no pooling, no proper timeout handling.
      technical_details: |
        Line 322: java.net.HttpURLConnection conn = (java.net.HttpURLConnection) uri.toURL().openConnection();
        - New connection per retry attempt
        - 5-second connect timeout only
        - No read timeout configuration
        - No retry logic for transient failures
        - Response code 200 check hardcoded (doesn't handle 201, 204)
        
        CURRENT CODE (PROBLEMATIC):
        ```java
        private Map<String, String> fetchContentFromContentService(String campaignId) {
            String contentServiceUrl = System.getenv().getOrDefault("CONTENT_SERVICE_URL", 
                "http://content-service:8090"); // Wrong port too
            java.net.URI uri = java.net.URI.create(contentServiceUrl + "/api/v1/content/campaign/" + campaignId);
            java.net.HttpURLConnection conn = (java.net.HttpURLConnection) uri.toURL().openConnection();
            // No connection pooling!
        }
        ```
      impacted_flow: |
        Email Retry Scheduled → Content Fetch → Port Allocation → 
        Port Exhaustion (16K limit) → Connection Failures → Delivery Halt
      root_cause: |
        Using low-level HttpURLConnection instead of WebClient with connection pooling.
      fix_recommendation: |
        Replace with WebClient connection pooling:
        ```java
        @Component
        public class ContentServiceClient {
            private final WebClient webClient;
            
            public ContentServiceClient(@Value("${legent.content-service.url}") String baseUrl) {
                this.webClient = WebClient.builder()
                    .baseUrl(baseUrl)
                    .clientConnector(new ReactorClientHttpConnector(
                        HttpClient.create()
                            .option(ChannelOption.CONNECT_TIMEOUT_MILLIS, 5000)
                            .responseTimeout(Duration.ofSeconds(10))
                            .option(ChannelOption.SO_KEEPALIVE, true)
                    ))
                    .build();
            }
        }
        ```
      dependency_impact: |
        delivery-service depends on content-service
      risk_if_not_fixed: |
        CRITICAL: Email retry failures at scale, port exhaustion, complete delivery halt
      validation_steps: |
        1. Load test with 10,000 concurrent retries
        2. Monitor: netstat -an | grep CLOSE_WAIT | wc -l
        3. Verify connection reuse in metrics

    - id: "LEGENT-CRIT-004"
      fix_order: 4
      priority: "Critical"
      layer: "Data Consistency"
      module: "services/tracking-service"
      files:
        - "services/tracking-service/src/main/java/com/legent/tracking/service/TrackingIngestionService.java:31-44"
        - "services/tracking-service/src/main/java/com/legent/tracking/service/TrackingIngestionService.java:46-57"
        - "services/tracking-service/src/main/java/com/legent/tracking/service/TrackingIngestionService.java:59-75"
      issue_type: "Eventual Consistency Violation"
      title: "Tracking Events Published Outside Transaction (Outbox Pattern Inconsistency)"
      description: |
        processClick and processConversion publish Kafka events directly without 
        transactional outbox pattern. If DB transaction rolls back, Kafka event remains.
        processOpen correctly uses outbox pattern but other methods don't.
      technical_details: |
        processOpen (CORRECT - uses outbox):
        Line 40-43: saveEventToDatabase(payload); publishEventWithOutbox(payload);
        
        processClick (INCORRECT - publishes directly):
        Line 55: saveEventToDatabase(payload);
        Line 56: eventPublisher.publishIngestedEvent(payload); // WRONG!
        
        processConversion (INCORRECT - publishes directly):
        Line 73: saveEventToDatabase(payload);
        Line 74: eventPublisher.publishIngestedEvent(payload); // WRONG!
      impacted_flow: |
        Click Event Received → DB Save + Kafka Publish → DB Transaction Rollback → 
        Kafka Event Persisted → ClickHouse Has Event But PostgreSQL Doesn't → 
        Data Inconsistency
      root_cause: |
        Inconsistent application of transactional outbox pattern across methods.
      fix_recommendation: |
        Standardize all methods to use publishEventWithOutbox():
        ```java
        @Transactional
        public void processClick(...) {
            // ... validation ...
            TrackingDto.RawEventPayload payload = buildPayload(...);
            saveEventToDatabase(payload);
            publishEventWithOutbox(payload); // Use this for all methods
        }
        ```
      dependency_impact: |
        tracking-service Kafka events, ClickHouse analytics
      risk_if_not_fixed: |
        CRITICAL: Data inconsistency between ClickHouse and PostgreSQL
      validation_steps: |
        1. Simulate DB failure after Kafka publish
        2. Verify Kafka message exists but DB record doesn't
        3. Check all tracking methods use outbox

    - id: "LEGENT-CRIT-005"
      fix_order: 5
      priority: "Critical"
      layer: "Performance"
      module: "services/platform-service"
      files:
        - "services/platform-service/src/main/java/com/legent/platform/service/WebhookRetryService.java:52-64"
        - "services/platform-service/src/main/java/com/legent/platform/service/WebhookRetryService.java:61-63"
      issue_type: "Performance Bottleneck"
      title: "Webhook Retry Sequential Processing - No Parallelism"
      description: |
        @Scheduled method processes webhook retries sequentially in single thread.
        Slow webhook endpoints block processing of all other retries.
        Queue buildup under load leads to SLA violations.
      technical_details: |
        Line 61-63:
        for (WebhookRetry retry : retries) {
            processRetry(retry); // Sequential processing
        }
        
        - 30-second fixedDelay timer
        - Each attempt has 10-second timeout
        - Max ~3 retries per invocation (30s / 10s)
        - No parallel processing
        - No batch processing
      impacted_flow: |
        Webhook Failure → Retry Queue → Sequential Processing → 
        Slow Endpoint Blocks Queue → Retry Delays → SLA Violations
      root_cause: |
        No parallel processing or worker pool for webhook retries.
      fix_recommendation: |
        Implement parallel processing:
        ```java
        @Scheduled(fixedDelay = 30000)
        public void processRetries() {
            List<WebhookRetry> pending = retryRepository.findPendingRetries(Instant.now());
            pending.parallelStream()
                .limit(10) // Max 10 concurrent
                .forEach(this::processRetryAsync);
        }
        
        @Async("webhookRetryExecutor")
        public void processRetryAsync(WebhookRetry retry) {
            processRetry(retry);
        }
        ```
      dependency_impact: |
        Webhook delivery, downstream integrations
      risk_if_not_fixed: |
        CRITICAL: Webhook delivery delays, downstream integration failures, SLA violations
      validation_steps: |
        1. Create 100 pending retries with slow endpoint (5s delay)
        2. Monitor processing rate
        3. Should handle >100/minute with parallel processing

