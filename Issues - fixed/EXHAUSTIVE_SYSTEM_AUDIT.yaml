    - id: "LEGENT-HIGH-001"
      fix_order: 6
      priority: "High"
      layer: "Transaction Management"
      module: "services/audience-service"
      files:
        - "services/audience-service/src/main/java/com/legent/audience/service/SubscriberService.java:148-179"
        - "services/audience-service/src/main/java/com/legent/audience/service/SubscriberService.java:161-166"
      issue_type: "Transaction Boundary"
      title: "Bulk Upsert All-or-Nothing Transaction Risk"
      description: |
        Bulk upsert saves each subscriber individually but entire operation wrapped
        in single @Transactional. Exception in one record rolls back ALL previous saves.
        10,000 subscriber import can lose all progress due to one bad record.
      technical_details: |
        Line 161, 166: subscriberRepository.save() called per record
        - @Transactional at method level
        - No intermediate flush()
        - All-or-nothing behavior
        - No partial success tracking
      impacted_flow: |
        CSV Import (10,000 records) → Bulk Upsert → Error at Record 9,999 → 
        Transaction Rollback → All 9,998 Previous Records Lost
      root_cause: |
        Large transaction scope without chunking strategy.
      fix_recommendation: |
        Implement chunk-based processing:
        ```java
        public BulkUpsertResponse bulkUpsert(BulkUpsertRequest request) {
            List<CreateRequest> chunks = Lists.partition(request.getSubscribers(), 100);
            for (List<CreateRequest> chunk : chunks) {
                processChunk(chunk); // Each chunk = separate transaction
            }
        }
        
        @Transactional
        protected void processChunk(List<CreateRequest> chunk) {
            // Process 100 records in single transaction
        }
        ```
      risk_if_not_fixed: |
        HIGH: Import failures lose all progress, timeout on large imports

