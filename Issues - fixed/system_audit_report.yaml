    - id: "LEGENT-AUDIT-008"
      fix_order: 8
      priority: "High"
      layer: "Frontend"
      module: "frontend"
      files:
        - "frontend/src/stores/toastStore.ts:27"
      issue_type: "Logic Error"
      title: "Toast ID Collision - Math.random() Insufficient for ID Generation"
      description: |
        Toast IDs generated with Math.random().toString(36).substring(2, 9)
        produces only 7-character alphanumeric strings. Birthday paradox 
        means collisions likely with >1000 toasts.
      technical_details: |
        - 36^7 = 78 billion possible values but substring truncates entropy
        - Math.random() not cryptographically secure but sufficient for UI
        - Real issue: no collision detection, duplicate IDs cause React key errors
      impacted_flow: |
        Multiple Actions → Toast Creation → Duplicate ID → React Render Error
      root_cause: |
        Insufficient entropy in ID generation with no collision handling.
      fix_recommendation: |
        ```typescript
        const id = `${Date.now()}-${Math.random().toString(36).substring(2, 11)}`;
        // Or use crypto.randomUUID() if available
        ```
      dependency_impact: |
        UI display issues when many toasts shown
      risk_if_not_fixed: |
        React key warnings, toast display/close issues, memory leaks
      validation_steps: |
        1. Rapidly create 2000 toasts
        2. Check console for duplicate key warnings

