    - id: "LEGENT-AUDIT-001"
      fix_order: 1
      priority: "Critical"
      layer: "Security"
      module: "shared/legent-security"
      files:
        - "shared/legent-security/src/main/java/com/legent/security/JwtTokenProvider.java:33"
      issue_type: "Security Vulnerability"
      title: "JWT Secret Key Insufficient Length Check Missing"
      description: |
        JWT signing key is created directly from secret bytes without minimum length validation.
        Short secrets (< 256 bits / 32 bytes) result in weak HMAC-SHA256 signatures vulnerable to brute force.
      technical_details: |
        - Keys.hmacShaKeyFor() accepts any length, but HMAC-SHA256 requires >= 256 bits for security
        - No validation that secret meets minimum length requirement
        - Constructor silently accepts weak secrets
      impacted_flow: |
        Authentication → Token Generation → Token Validation → All API Access
      root_cause: |
        Missing secret key strength validation in JwtTokenProvider constructor.
        The application relies on deployment-time configuration without runtime validation.
      fix_recommendation: |
        Add minimum length validation in constructor:
        ```java
        if (secret == null || secret.getBytes(StandardCharsets.UTF_8).length < 32) {
            throw new IllegalArgumentException("JWT secret must be at least 256 bits (32 bytes)");
        }
        ```
      dependency_impact: |
        Impacts ALL services using JWT authentication (identity-service, all other services)
      risk_if_not_fixed: |
        Authentication bypass, session hijacking, privilege escalation in production
      validation_steps: |
        1. Test with short secret (< 32 chars) - should throw exception
        2. Test with 32+ char secret - should work normally
        3. Verify all existing secrets meet minimum length

    - id: "LEGENT-AUDIT-002"
      fix_order: 2
      priority: "Critical"
      layer: "Security"
      module: "shared/legent-security"
      files:
        - "shared/legent-security/src/main/java/com/legent/security/TenantContext.java:17-18"
      issue_type: "Memory Leak / Thread Safety"
      title: "ThreadLocal Values Not Cleared After Async Processing"
      description: |
        TenantContext uses ThreadLocal without guaranteed cleanup in async contexts.
        Thread pool reuse can leak tenant context between requests.
      technical_details: |
        - ThreadLocal.set() in lines 26, 44 without guaranteed cleanup
        - clear() method exists but not automatically called after async operations
        - WorkflowEngine uses @Async - thread pool threads persist and retain ThreadLocal values
      impacted_flow: |
        Async Workflow Execution → Tenant Data Leak → Cross-Tenant Data Exposure
      root_cause: |
        No automatic cleanup mechanism for ThreadLocal after request/transaction completion.
        The clear() method requires manual invocation.
      fix_recommendation: |
        1. Add @PreDestroy or use TaskDecorator for async executors
        2. Implement automatic cleanup via TransactionSynchronization
        3. Add try-finally blocks in all async entry points
        ```java
        try {
            TenantContext.setTenantId(tenantId);
            // process
        } finally {
            TenantContext.clear();
        }
        ```
      dependency_impact: |
        Impacts automation-service (WorkflowEngine), all @Async operations
      risk_if_not_fixed: |
        Cross-tenant data leaks, GDPR violations, data privacy breaches
      validation_steps: |
        1. Run concurrent async workflows for different tenants
        2. Verify ThreadLocal values don't persist between executions
        3. Check thread pool thread state after multiple executions

    - id: "LEGENT-AUDIT-003"
      fix_order: 3
      priority: "Critical"
      layer: "Backend"
      module: "services/delivery-service"
      files:
        - "services/delivery-service/src/main/java/com/legent/delivery/service/DeliveryOrchestrationService.java:313-361"
      issue_type: "Incorrect Implementation"
      title: "Content-Service HTTP Client Created Per Request - No Connection Pooling"
      description: |
        fetchContentFromContentService() creates new HttpURLConnection per call without connection pooling.
        High volume email retries will exhaust ephemeral ports and cause connection timeouts.
      technical_details: |
        - Line 322: new HttpURLConnection created per retry
        - No connection reuse or pooling
        - No proper timeouts (only 5s connect/read)
        - No retry logic for transient failures
        - 200 status check hardcoded (doesn't handle 201, 204, etc.)
      impacted_flow: |
        Email Retry Scheduled → Content Fetch → Content-Service API Call → Port Exhaustion
      root_cause: |
        Using low-level HttpURLConnection instead of WebClient with connection pooling.
        Missing proper HTTP client configuration.
      fix_recommendation: |
        1. Use WebClient with connection pooling (similar to DeliverabilityServiceClient)
        2. Configure max connections, keep-alive, and proper timeouts
        3. Implement circuit breaker pattern
        ```java
        @Component
        public class ContentServiceClient {
            private final WebClient webClient;
            public ContentServiceClient(@Value(...) String baseUrl) {
                this.webClient = WebClient.builder()
                    .baseUrl(baseUrl)
                    .clientConnector(new ReactorClientHttpConnector(
                        HttpClient.create().option(ChannelOption.CONNECT_TIMEOUT_MILLIS, 5000)
                    )).build();
            }
        }
        ```
      dependency_impact: |
        delivery-service depends on content-service for retry content
      risk_if_not_fixed: |
        Email retry failures at scale, port exhaustion, memory leaks from unclosed connections
      validation_steps: |
        1. Load test with 1000 concurrent retries
        2. Monitor netstat for CLOSE_WAIT connections
        3. Verify connection reuse in metrics

