      issue_type: "Schema Design"
      title: "Webhook Retries Table Missing Foreign Key to webhook_configs"
      description: |
        webhook_retries.webhook_id has no foreign key constraint.
        Orphaned retry records possible when webhook deleted.
      technical_details: |
        - webhook_id VARCHAR(36) NOT NULL - no FK constraint
        - No ON DELETE behavior defined
        - WebhookRetryService line 75: handles null config but not orphaned retries
        - Soft-delete on webhook_configs means FK would need careful handling
      impacted_flow: |
        Webhook Deleted → Orphaned Retries → Wasted Processing → Resource Waste
      root_cause: |
        Schema migration omitted foreign key constraint for referential integrity.
      fix_recommendation: |
        ```sql
        ALTER TABLE webhook_retries 
        ADD CONSTRAINT fk_webhook_retries_config 
        FOREIGN KEY (webhook_id) REFERENCES webhook_configs(id) 
        ON DELETE CASCADE;
        ```
        Or implement scheduled cleanup job for orphaned records.
      dependency_impact: |
        Database integrity, wasted retry processing
      risk_if_not_fixed: |
        Orphaned data growth, wasted compute on deleted webhooks
