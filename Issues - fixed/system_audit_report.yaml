    - id: "LEGENT-AUDIT-006"
      fix_order: 6
      priority: "High"
      layer: "Backend"
      module: "services/platform-service"
      files:
        - "services/platform-service/src/main/java/com/legent/platform/service/WebhookRetryService.java:52-64"
      issue_type: "Performance Bottleneck"
      title: "Webhook Retry Sequential Processing Blocks All Retries"
      description: |
        @Scheduled method processes retries sequentially in a single thread.
        Slow webhook endpoints block processing of all other retries.
      technical_details: |
        - Line 61-63: for-loop processes one retry at a time
        - 30-second fixedDelay timer
        - Each attempt has 10-second timeout (line 130)
        - Max ~3 retries per invocation, no parallelism
        - Database query fetches ALL pending retries but processes serially
      impacted_flow: |
        Webhook Failure → Scheduled Retry → Sequential Processing → Queue Buildup
      root_cause: |
        No parallel processing or worker pool for webhook retries.
      fix_recommendation: |
        1. Use @Async with dedicated thread pool
        2. Implement batch processing with parallel streams (limit concurrency)
        3. Add configurable max retries per batch
        ```java
        @Scheduled(fixedDelay = 30000)
        public void processRetries() {
            List<WebhookRetry> pending = retryRepository.findPendingRetries(Instant.now());
            pending.parallelStream()
                .limit(10) // Process max 10 concurrently
                .forEach(this::processRetryAsync);
        }
        ```
      dependency_impact: |
        Webhook delivery delays affect downstream integrations
      risk_if_not_fixed: |
        Webhook queue buildup, delayed notifications, SLA violations
      validation_steps: |
        1. Create 100 pending retries with slow endpoint (5s delay)
        2. Monitor processing rate - should handle >10/minute

