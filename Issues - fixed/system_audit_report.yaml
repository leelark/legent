    - id: "LEGENT-AUDIT-004"
      fix_order: 4
      priority: "High"
      layer: "Backend"
      module: "services/audience-service"
      files:
        - "services/audience-service/src/main/java/com/legent/audience/service/SubscriberService.java:148-179"
      issue_type: "Data Consistency Risk"
      title: "Bulk Upsert No Transaction Boundary for Individual Records"
      description: |
        Bulk upsert loops through subscribers and saves individually without batching.
        Partial failures leave database in inconsistent state.
      technical_details: |
        - Line 161, 166: subscriberRepository.save() called per record
        - Single @Transactional at method level but no batch flush
        - Exception in one record rolls back entire transaction (all-or-nothing)
        - No partial success tracking
        - Error handling catches but doesn't prevent rollback
      impacted_flow: |
        CSV Import → Bulk Upsert → Database Insert/Update → Partial Data Loss on Error
      root_cause: |
        Large transaction scope with eager flushing. Need batch processing with chunking.
      fix_recommendation: |
        1. Implement chunk-based processing (e.g., 100 records per transaction)
        2. Use saveAll() for batch inserts
        3. Track individual record success/failure separately
        4. Implement JpaRepository flush() between chunks
      dependency_impact: |
        Import jobs may partially fail leaving orphaned records
      risk_if_not_fixed: |
        Data inconsistency, duplicate processing, timeout on large imports
      validation_steps: |
        1. Import 10000 records with one invalid record
        2. Verify if valid records are persisted
        3. Check transaction boundaries in logs

