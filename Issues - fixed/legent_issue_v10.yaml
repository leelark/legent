- fix_order: 1
  priority: CRITICAL
  layer: Backend
  module: Delivery SMTP
  file_names:
    - services/delivery-service/src/main/java/com/legent/delivery/adapter/impl/SmtpProviderAdapter.java
    - services/delivery-service/src/main/java/com/legent/delivery/domain/SmtpProvider.java
  issue_type: SECURITY_RISK
  category: Bug
  short_description: SMTP credential misuse using password hash
  technical_details: >
    Password hash field is directly used for SMTP authentication.
    Either authentication fails or plaintext is stored insecurely.
  impacted_flow: Email delivery
  root_cause: Improper credential modeling
  fix_recommendation: >
    Store encrypted secrets separately and decrypt at runtime.
  dependency_impact: All SMTP sends
  risk_if_not_fixed: Delivery failure and credential compromise

