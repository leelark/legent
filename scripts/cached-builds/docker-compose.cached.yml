# Docker Compose with Cached Base Image
# Uses pre-built legent-shared-base for faster service builds
#
# Usage:
#   1. First, build the base: .\build-shared-base.ps1
#   2. Then use this compose: docker compose -f docker-compose.yml -f docker-compose.cached.yml build

services:
  foundation-service:
    build:
      dockerfile: Dockerfile.cached
      additional_contexts:
        - legent-shared-base=docker-image://legent-shared-base:latest

  identity-service:
    build:
      dockerfile: Dockerfile.cached
      additional_contexts:
        - legent-shared-base=docker-image://legent-shared-base:latest

