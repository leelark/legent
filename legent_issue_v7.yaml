- fix_order: 7
  priority: Medium
  layer_module: BE
  file_names:
    - services/*/src/main/java/**/repository/*.java
  issue_category: Performance
  short_description: N+1 query problems in JPA usage
  technical_details: >
    Lazy-loaded relationships are accessed in loops without fetch joins,
    causing excessive DB queries.
  impacted_flow: Data fetching APIs
  root_cause: Improper JPA fetch strategy
  fix_recommendation: >
    Use fetch joins or entity graphs
  dependency_impact: DB performance
  risk_if_not_fixed: High latency

