- fix_order: 1
  priority: Critical
  layer_module: BE
  file_names:
    - services/identity-service/src/main/java/com/legent/identity/security/JwtService.java
    - services/identity-service/src/main/java/com/legent/identity/security/SecurityConfig.java
  issue_category: Security
  short_description: JWT validation lacks strict signature and expiry enforcement
  technical_details: >
    Token parsing does not consistently enforce signature validation and expiration checks,
    allowing potentially expired or tampered tokens to pass authentication in edge cases.
  impacted_flow: Authentication, authorization, API security
  root_cause: Improper JWT validation configuration
  fix_recommendation: >
    Enforce strict signature verification, expiration validation, and algorithm checks
  dependency_impact: All secured APIs
  risk_if_not_fixed: Unauthorized access, token forgery risk

- fix_order: 2
  priority: High
  layer_module: BE
  file_names:
    - services/*/src/main/java/**/controller/*.java
  issue_category: Bug
  short_description: Missing global exception handling
  technical_details: >
    Controllers directly return errors without a centralized @ControllerAdvice,
    leading to inconsistent error formats and unhandled runtime exceptions.
  impacted_flow: All API responses
  root_cause: Lack of global exception handler
  fix_recommendation: >
    Implement centralized exception handling using @RestControllerAdvice
  dependency_impact: All services
  risk_if_not_fixed: Inconsistent API behavior, poor client handling

- fix_order: 3
  priority: High
  layer_module: BE
  file_names:
    - services/*/src/main/java/**/service/*.java
  issue_category: Performance
  short_description: Blocking operations in service layer
  technical_details: >
    Several services perform synchronous DB and external calls without async handling,
    causing thread blocking under load.
  impacted_flow: High concurrency operations, API latency
  root_cause: Lack of async/non-blocking design
  fix_recommendation: >
    Introduce async processing or reactive patterns where applicable
  dependency_impact: Thread pools, API performance
  risk_if_not_fixed: Scalability bottlenecks

- fix_order: 4
  priority: High
  layer_module: DB
  file_names:
    - database/schema/*.sql
    - services/*/src/main/java/**/entity/*.java
  issue_category: Design
  short_description: Missing database constraints and indexes
  technical_details: >
    Tables lack foreign key constraints, unique constraints, and proper indexing,
    leading to data inconsistency and slow queries.
  impacted_flow: Data integrity, query performance
  root_cause: Incomplete schema design
  fix_recommendation: >
    Add constraints and indexes aligned with query patterns
  dependency_impact: All DB operations
  risk_if_not_fixed: Data corruption, slow performance

- fix_order: 5
  priority: High
  layer_module: Integration
  file_names:
    - services/*/src/main/java/**/client/*.java
  issue_category: Integration
  short_description: No retry or timeout configuration for inter-service calls
  technical_details: >
    REST clients lack timeout, retry, and circuit breaker configurations,
    making services fragile to downstream failures.
  impacted_flow: Service-to-service communication
  root_cause: Missing resilience patterns
  fix_recommendation: >
    Implement timeouts, retries, and circuit breakers (e.g., Resilience4j)
  dependency_impact: All integrations
  risk_if_not_fixed: Cascading failures

