    - id: "ISSUE-0001"
      fix_order: 1
      priority: "Critical"
      layer: "Config"
      module: "AuthBootstrap"
      files:
        - "docker-compose.yml"
        - "services/audience-service/src/main/resources/application.yml"
        - "services/deliverability-service/src/main/resources/application.yml"
        - "services/foundation-service/src/main/resources/application.yml"
        - "services/identity-service/src/main/resources/application.yml"
      issue_type: "Startup Misconfiguration"
      title: "JWT secret environment variable mismatch across services"
      description: |
        Multiple services expect JWT_SECRET while docker-compose provides LEGENT_SECURITY_JWT_SECRET.
        This leads to inconsistent or missing JWT configuration at runtime.
      technical_details: |
        - Services bind: legent.security.jwt.secret = ${JWT_SECRET}
        - docker-compose defines: LEGENT_SECURITY_JWT_SECRET
        - No fallback or mapping present
        - Results in null/invalid JWT secret during initialization
      impacted_flow: |
        Service startup → Security initialization → JWT validation → All protected APIs
      root_cause: |
        Inconsistent environment variable naming between configuration and deployment layers.
      fix_recommendation: |
        Standardize to a single variable (LEGENT_SECURITY_JWT_SECRET) across all services and configs.
      dependency_impact: |
        Breaks authentication across identity, audience, deliverability, and foundation services.
      risk_if_not_fixed: |
        Services may fail to start or produce invalid tokens causing auth failures.
      validation_steps: |
        - Start full stack via docker-compose
        - Verify JWT generation and validation across services
        - Test authenticated endpoints end-to-end

    - id: "ISSUE-0002"
      fix_order: 2
      priority: "Critical"
      layer: "Security"
      module: "TenantGate"
      files:
        - "shared/legent-security/src/main/java/com/legent/security/TenantFilter.java"
        - "services/identity-service/src/main/java/com/legent/identity/controller/AuthController.java"
        - "services/tracking-service/src/main/java/com/legent/tracking/controller/TrackingController.java"
        - "services/tracking-service/src/main/java/com/legent/tracking/controller/IngestionController.java"
        - "frontend/src/lib/auth-api.ts"
        - "frontend/src/components/tracking/TrackingPixel.tsx"
        - "frontend/src/components/tracking/ClickLink.tsx"
      issue_type: "Broken Public Flow"
      title: "Tenant filter blocks public endpoints"
      description: |
        TenantFilter enforces X-Tenant-Id header globally, blocking signup and tracking endpoints
        that are intended to be publicly accessible.
      technical_details: |
        - Filter excludes only health/actuator
        - Signup API does not include tenant header
        - Tracking endpoints accessed by external users cannot include tenant header
        - Requests fail before reaching controller
      impacted_flow: |
        Signup → AuthController
        Email open/click → TrackingController
      root_cause: |
        Missing exemption rules for public routes in TenantFilter.
      fix_recommendation: |
        Add whitelist paths for auth and tracking OR derive tenant from signed tokens/query params.
      dependency_impact: |
        Blocks onboarding and analytics ingestion.
      risk_if_not_fixed: |
        Signup fails and tracking metrics drop to zero.
      validation_steps: |
        - Test signup without tenant header
        - Load tracking pixel externally
        - Confirm successful request processing

