services:
  postgres:
    image: postgres:15-alpine
    container_name: legent-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: legent_user
      POSTGRES_PASSWORD: legent_password
    ports:
      - "5432:5432"
    volumes:
      - legent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legent_user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 15

  postgres-init:
    image: postgres:15-alpine
    container_name: legent-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: legent_password
    command:
      - sh
      - -c
      - |
        set -e
        psql -h postgres -U legent_user -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_foundation'" | grep -q 1 || psql -h postgres -U legent_user -d postgres -c "CREATE DATABASE legent_foundation"
        psql -h postgres -U legent_user -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_identity'" | grep -q 1 || psql -h postgres -U legent_user -d postgres -c "CREATE DATABASE legent_identity"
        psql -h postgres -U legent_user -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_audience'" | grep -q 1 || psql -h postgres -U legent_user -d postgres -c "CREATE DATABASE legent_audience"
        psql -h postgres -U legent_user -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_campaign'" | grep -q 1 || psql -h postgres -U legent_user -d postgres -c "CREATE DATABASE legent_campaign"
        psql -h postgres -U legent_user -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_delivery'" | grep -q 1 || psql -h postgres -U legent_user -d postgres -c "CREATE DATABASE legent_delivery"
        psql -h postgres -U legent_user -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_tracking'" | grep -q 1 || psql -h postgres -U legent_user -d postgres -c "CREATE DATABASE legent_tracking"
        psql -h postgres -U legent_user -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_automation'" | grep -q 1 || psql -h postgres -U legent_user -d postgres -c "CREATE DATABASE legent_automation"
        psql -h postgres -U legent_user -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_deliverability'" | grep -q 1 || psql -h postgres -U legent_user -d postgres -c "CREATE DATABASE legent_deliverability"
        psql -h postgres -U legent_user -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_platform'" | grep -q 1 || psql -h postgres -U legent_user -d postgres -c "CREATE DATABASE legent_platform"
        echo "All databases created successfully"

  redis:
    image: redis:7-alpine
    container_name: legent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: legent-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: legent-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 15

  mailhog:
    image: mailhog/mailhog
    container_name: legent-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  foundation-service:
    build: ./services/foundation-service
    container_name: legent-foundation
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/legent_foundation
      - SPRING_DATASOURCE_USERNAME=legent_user
      - SPRING_DATASOURCE_PASSWORD=legent_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
      - SPRING_FLYWAY_VALIDATE_ON_MIGRATE=false
      - SPRING_FLYWAY_OUT_OF_ORDER=true
      - KAFKA_BOOTSTRAP=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  identity-service:
    build: ./services/identity-service
    container_name: legent-identity
    ports:
      - "8089:8089"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/legent_identity
      - SPRING_DATASOURCE_USERNAME=legent_user
      - SPRING_DATASOURCE_PASSWORD=legent_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
      - SPRING_FLYWAY_VALIDATE_ON_MIGRATE=false
      - SPRING_FLYWAY_OUT_OF_ORDER=true
    depends_on:
      postgres-init:
        condition: service_completed_successfully

  audience-service:
