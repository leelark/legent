      start_period: 120s

  platform-service:
    build: ./services/platform-service
    container_name: legent-platform-service
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_TOOL_OPTIONS=-Xmx512m -Xms512m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/legent_platform
      - SPRING_DATASOURCE_USERNAME=legent
      - SPRING_DATASOURCE_PASSWORD=legent
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
      - SPRING_FLYWAY_VALIDATE_ON_MIGRATE=false
      - SPRING_FLYWAY_OUT_OF_ORDER=true
