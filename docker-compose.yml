services:
  postgres:
    image: postgres:15-alpine
    container_name: legent-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: legent
      POSTGRES_PASSWORD: legent
    ports:
      - "5432:5432"
    volumes:
      - legent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U legent -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 15

  postgres-init:
    image: postgres:15-alpine
    container_name: legent-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: legent
    command:
      - sh
      - -c
      - |
        set -e
        psql -h postgres -U legent -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_foundation'" | grep -q 1 || psql -h postgres -U legent -d postgres -c "CREATE DATABASE legent_foundation"
        psql -h postgres -U legent -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_identity'" | grep -q 1 || psql -h postgres -U legent -d postgres -c "CREATE DATABASE legent_identity"
        psql -h postgres -U legent -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_audience'" | grep -q 1 || psql -h postgres -U legent -d postgres -c "CREATE DATABASE legent_audience"
        psql -h postgres -U legent -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_content'" | grep -q 1 || psql -h postgres -U legent -d postgres -c "CREATE DATABASE legent_content"
        psql -h postgres -U legent -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_campaign'" | grep -q 1 || psql -h postgres -U legent -d postgres -c "CREATE DATABASE legent_campaign"
        psql -h postgres -U legent -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_delivery'" | grep -q 1 || psql -h postgres -U legent -d postgres -c "CREATE DATABASE legent_delivery"
        psql -h postgres -U legent -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_tracking'" | grep -q 1 || psql -h postgres -U legent -d postgres -c "CREATE DATABASE legent_tracking"
        psql -h postgres -U legent -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_automation'" | grep -q 1 || psql -h postgres -U legent -d postgres -c "CREATE DATABASE legent_automation"
        psql -h postgres -U legent -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_deliverability'" | grep -q 1 || psql -h postgres -U legent -d postgres -c "CREATE DATABASE legent_deliverability"
        psql -h postgres -U legent -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='legent_platform'" | grep -q 1 || psql -h postgres -U legent -d postgres -c "CREATE DATABASE legent_platform"
        echo "All databases created successfully"

  redis:
    image: redis:7-alpine
    container_name: legent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 60s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: legent-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "srvr,ruok"
    healthcheck:
      test: [ "CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Mode" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: legent-kafka
    restart: on-failure
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: legent-kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      sh -c "
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic system.initialized --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic config.updated --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic subscriber.created --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic send.requested --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email.send.requested --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email.sent --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email.bounced --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email.complaint --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic tracking.ingested --partitions 3 --replication-factor 1 &&
        echo 'Essential topics created'
      "

  mailhog:
    image: mailhog/mailhog
    container_name: legent-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio
    container_name: legent-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - legent_minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: legent-opensearch
    environment:
      - cluster.name=legent-cluster
      - node.name=legent-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?wait_for_status=yellow"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: legent-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: legent-kafka-ui
    ports:
      - "8091:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy


  foundation-service:
    build: ./services/foundation-service
    container_name: legent-foundation
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_TOOL_OPTIONS=-Xmx512m -Xms512m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/legent_foundation
      - SPRING_DATASOURCE_USERNAME=legent
      - SPRING_DATASOURCE_PASSWORD=legent
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
      - SPRING_FLYWAY_VALIDATE_ON_MIGRATE=false
      - SPRING_FLYWAY_OUT_OF_ORDER=true
      - KAFKA_BOOTSTRAP=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  identity-service:
