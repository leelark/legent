      timeout: 5s
      retries: 20
      start_period: 90s

  frontend:
    build: ./frontend
    container_name: legent-frontend
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      - API_GATEWAY_URL=http://gateway

  gateway:
    image: nginx:1.27-alpine
    container_name: legent-gateway
    ports:
      - "8080:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:rw
      - ./config/nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:rw
    depends_on:
      foundation-service:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      audience-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
      campaign-service:
        condition: service_healthy
      delivery-service:
        condition: service_healthy
      tracking-service:
        condition: service_healthy
      automation-service:
        condition: service_healthy
      deliverability-service:
        condition: service_healthy
      platform-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/nginx-health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  legent_pgdata:
  legent_minio_data:
