x-service-defaults: &service-defaults
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 768M
      reservations:
        cpus: "0.25"
        memory: 512M

x-spring-env: &spring-env
  SPRING_PROFILES_ACTIVE: prod
  JAVA_TOOL_OPTIONS: -Xmx512m -Xms256m
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
  SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
  SPRING_FLYWAY_OUT_OF_ORDER: "true"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP: kafka:9092
  LEGENT_SECURITY_JWT_SECRET: ${LEGENT_SECURITY_JWT_SECRET}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://app.legent.local}

x-db-env: &db-env
  SPRING_DATASOURCE_USERNAME: legent
  SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-legent}

services:
  postgres:
    image: postgres:15-alpine
    container_name: legent-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: legent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-legent}
    ports:
      - "5432:5432"
    volumes:
      - legent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legent -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  postgres-init:
    image: postgres:15-alpine
    container_name: legent-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-legent}
    command:
      - sh
      - -c
      - |
        set -e
        for db in legent_foundation legent_identity legent_audience legent_content legent_campaign legent_delivery legent_tracking legent_automation legent_deliverability legent_platform; do
          psql -h postgres -U legent -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$$db'" | grep -q 1 || \
          psql -h postgres -U legent -d postgres -c "CREATE DATABASE $$db"
        done
        echo "All databases ready"

  redis:
    image: redis:7-alpine
    container_name: legent-redis
    command: >
      sh -c "redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: legent-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "srvr,ruok"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: legent-kafka
    restart: on-failure
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: legent-kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      sh -c "
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic system.initialized --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic config.updated --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic subscriber.created --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic subscriber.updated --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic subscriber.deleted --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic segment.created --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic segment.recomputed --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic send.requested --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic send.audience.resolution.requested --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic send.audience.resolved --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic send.completed --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic send.failed --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email.send.requested --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email.sent --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email.failed --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email.bounced --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email.complaint --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email.open --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email.click --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email.delivered --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic conversion.event --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic tracking.ingested --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.trigger --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.started --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.completed --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic domain.verified --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic reputation.updated --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic suppression.updated --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic webhook.triggered --partitions 3 --replication-factor 1 &&
        echo 'All topics created'
      "

  mailhog:
    image: mailhog/mailhog
    container_name: legent-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  minio:
    image: minio/minio
    container_name: legent-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - legent_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: legent-opensearch
    environment:
      - cluster.name=legent-cluster
      - node.name=legent-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?wait_for_status=yellow"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ClickHouse native port mapped to 9009 to avoid conflict with MinIO (9000)
  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: legent-clickhouse
    ports:
      - "8123:8123"
      - "9009:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: legent-kafka-ui
    ports:
      - "8091:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  foundation-service:
    build: ./services/foundation-service
    container_name: legent-foundation
    <<: *service-defaults
    ports:
      - "8081:8081"
    environment:
      <<: [*spring-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legent_foundation
      OPENSEARCH_URL: http://opensearch:9200
      SEARCH_ENABLED: "false"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  identity-service:
    build: ./services/identity-service
    container_name: legent-identity
    <<: *service-defaults
    ports:
      - "8089:8089"
    environment:
      <<: [*spring-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legent_identity
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8089/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  content-service:
    build: ./services/content-service
    container_name: legent-content
    <<: *service-defaults
    ports:
      - "8090:8090"
    environment:
      <<: [*spring-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legent_content
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: legent-assets
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8090/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  audience-service:
    build: ./services/audience-service
    container_name: legent-audience
    <<: *service-defaults
    ports:
      - "8082:8082"
    environment:
      <<: [*spring-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legent_audience
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: legent-imports
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  campaign-service:
    build: ./services/campaign-service
    container_name: legent-campaign
    <<: *service-defaults
    ports:
      - "8083:8083"
    environment:
      <<: [*spring-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legent_campaign
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  delivery-service:
    build: ./services/delivery-service
    container_name: legent-delivery
    <<: *service-defaults
    ports:
      - "8084:8084"
    environment:
      <<: [*spring-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legent_delivery
      MAIL_HOST: mailhog
      MAIL_PORT: "1025"
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_SMTP_AUTH: "false"
      MAIL_SMTP_STARTTLS: "false"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  tracking-service:
    build: ./services/tracking-service
    container_name: legent-tracking
    <<: *service-defaults
    ports:
      - "8085:8085"
    environment:
      <<: [*spring-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legent_tracking
      SPRING_DATASOURCE_CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123/default
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      SPRING_DATASOURCE_CLICKHOUSE_PASSWORD: ""
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  automation-service:
    build: ./services/automation-service
    container_name: legent-automation
    <<: *service-defaults
    ports:
      - "8086:8086"
    environment:
      <<: [*spring-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legent_automation
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8086/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  deliverability-service:
    build: ./services/deliverability-service
    container_name: legent-deliverability
    <<: *service-defaults
    ports:
      - "8087:8087"
    environment:
      <<: [*spring-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legent_deliverability
      LEGENT_DELIVERABILITY_MOCK_DNS: "false"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8087/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  platform-service:
    build: ./services/platform-service
    container_name: legent-platform-service
    <<: *service-defaults
    ports:
      - "8088:8088"
    environment:
      <<: [*spring-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legent_platform
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8088/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  frontend:
    build: ./frontend
    container_name: legent-frontend
    <<: *service-defaults
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ""
      API_GATEWAY_URL: http://gateway
    depends_on:
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  gateway:
    image: nginx:1.27-alpine
    container_name: legent-gateway
    ports:
      - "8080:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:rw
      - ./config/nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:rw
    depends_on:
      foundation-service:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      audience-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
      campaign-service:
        condition: service_healthy
      delivery-service:
        condition: service_healthy
      tracking-service:
        condition: service_healthy
      automation-service:
        condition: service_healthy
      deliverability-service:
        condition: service_healthy
      platform-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  legent_pgdata:
  legent_minio_data:
