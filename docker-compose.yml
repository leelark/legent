      - JAVA_TOOL_OPTIONS=-Xmx512m -Xms512m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/legent_deliverability
      - SPRING_DATASOURCE_USERNAME=legent
      - SPRING_DATASOURCE_PASSWORD=legent
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
      - SPRING_FLYWAY_VALIDATE_ON_MIGRATE=false
      - SPRING_FLYWAY_OUT_OF_ORDER=true
      - KAFKA_BOOTSTRAP=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
