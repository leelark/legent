    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8081
      - NEXT_PUBLIC_FOUNDATION_URL=http://localhost:8081
      - NEXT_PUBLIC_IDENTITY_URL=http://localhost:8089
