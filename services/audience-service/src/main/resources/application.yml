server:
  port: 8082
  servlet:
    context-path: /

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  application:
    name: audience-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:legent_audience}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER}}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}
    out-of-order: ${SPRING_FLYWAY_OUT_OF_ORDER:true}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: audience-service

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: audience-service

legent:
  security:
    jwt:
      secret: ${LEGENT_SECURITY_JWT_SECRET}
      expiration-ms: 86400000
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS}

  audience:
    import:
      chunk-size: 5000
      max-errors: 1000
      max-file-size-bytes: ${LEGENT_AUDIENCE_IMPORT_MAX_FILE_SIZE_BYTES:104857600}
      allowed-content-types: ${LEGENT_AUDIENCE_IMPORT_ALLOWED_CONTENT_TYPES:text/csv,application/csv,application/vnd.ms-excel,text/plain}
    segment:
      recompute-cron: "0 */15 * * * *"
      max-concurrent-evaluations: 5

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:legent-imports}

logging:
  level:
    root: INFO
    com.legent: DEBUG
  pattern:
    console: '{"time":"%d{ISO8601}","level":"%p","logger":"%c","correlationId":"%X{correlationId}","tenantId":"%X{tenantId}","msg":"%m"}%n'
