server:
  port: 8089

spring:
  application:
    name: identity-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/legent_identity}
    username: ${SPRING_DATASOURCE_USERNAME:legent_user}
    password: ${SPRING_DATASOURCE_PASSWORD:legent_password}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}

legent:
  security:
    jwt:
      secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration-ms: 86400000 # 24h
