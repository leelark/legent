server:
  port: ${PORT:8085}

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  application:
    name: tracking-service
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:legent_tracking}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER}}
    password: ${SPRING_DATASOURCE_PASSWORD}
    clickhouse:
      url: ${SPRING_DATASOURCE_CLICKHOUSE_URL:jdbc:clickhouse://${CLICKHOUSE_HOST:clickhouse}:${CLICKHOUSE_PORT:8123}/${CLICKHOUSE_DB:default}}
      username: ${SPRING_DATASOURCE_CLICKHOUSE_USERNAME:${CLICKHOUSE_USER:default}}
      password: ${SPRING_DATASOURCE_CLICKHOUSE_PASSWORD}
      driver-class-name: ${SPRING_DATASOURCE_CLICKHOUSE_DRIVER_CLASS_NAME:com.clickhouse.jdbc.ClickHouseDriver}
    hikari:
      maximum-pool-size: 50 # High ingest requires large DB pool if we aren't batching
      minimum-idle: 10

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 1000
          order_inserts: true
          order_updates: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}
    out-of-order: ${SPRING_FLYWAY_OUT_OF_ORDER:true}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: 1 # For tracking fire-and-forget, acks=1 or 0 allows much higher throughput than all
      retries: 3
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
    listener:
      type: batch
      concurrency: 3
      ack-mode: batch

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

logging:
  level:
    root: INFO
    com.legent: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

legent:
  tracking:
    signing-key: ${LEGENT_TRACKING_SIGNING_KEY}
  security:
    jwt:
      secret: ${LEGENT_SECURITY_JWT_SECRET}
      expiration-ms: 86400000
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS}
