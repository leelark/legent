metadata:
  report_name: "Complete Legent vs Salesforce Marketing Cloud Engagement Audit"
  artifact_path: "docs/audits/legent_salesforce_mce_audit_2026-05-11.yaml"
  generated_on: "2026-05-11"
  timezone: "Asia/Calcutta"
  product: "Legent v1.0.2"
  comparison_baseline: "Salesforce Marketing Cloud Engagement"
  audit_type: "static code, configuration, test evidence, prior audit revalidation, and product capability parity review"
  change_scope: "Audit artifact only. No product code changes."
  weighted_overall_formula:
    salesforce_feature_parity: 35
    functional_completeness: 20
    architecture_scale_reliability: 15
    security_compliance: 10
    observability_operations: 10
    ux_workflow_maturity: 5
    test_evidence: 5
  scoring_scale:
    min: 0
    max: 100
    meaning: "100 means Salesforce MCE parity or better for the assessed area; 0 means absent or unusable."
  headline_verdict:
    overall_salesforce_readiness_percent: 59
    public_ga_live_readiness_percent: 45
    private_beta_readiness_percent: 63
    verdict: "Not ready for public production launch. Backend has strong foundations, but frontend build, runtime orchestration, tracking consistency, backup/restore, secret posture, and Salesforce-parity gaps block GA."
  analysis_note: "All in-scope text files were included in inventory and static search passes. Generated/dependency/binary files were excluded from line-level scoring and summarized only. High-risk findings were manually revalidated against source anchors. This report does not claim runtime load or security penetration coverage beyond the commands and source review listed in test_evidence."

scope:
  included:
    product_areas:
      - "10 Spring services: identity, foundation, audience, content, campaign, delivery, tracking, automation, deliverability, platform"
      - "Shared libraries: legent-common, legent-security, legent-kafka, legent-cache, legent-test-support"
      - "Frontend app, routes, components, API client, middleware, styles, Playwright config, Next config"
      - "Docker Compose, Kubernetes manifests, CI/security workflow, scripts, config, operations docs"
      - "Tests, prior audit YAML files, generated documentation, docker logs, and evidence artifacts as supporting context"
    capability_taxonomy:
      - "identity_foundation"
      - "audience_data_extensions"
      - "content_email_studio"
      - "campaign_send_orchestration"
      - "delivery_provider_routing"
      - "tracking_analytics"
      - "automation_journeys"
      - "deliverability"
      - "platform_admin_webhooks_search"
      - "frontend_ux"
      - "infra_devops"
      - "security_compliance"
  excluded_from_line_level_scoring:
    - ".git"
    - "node_modules"
    - "target"
    - "compiled .class files"
    - "binary screenshots, videos, audio, PDFs, DOCX, ZIP, and packaged build outputs"
  binary_handling: "Inventory only, because content cannot be meaningfully line-scored without separate visual/media review."
  manual_review_scenarios_considered:
    - "signup, login, session handling, tenant isolation"
    - "audience import, segmentation, data extensions, consent, suppression"
    - "template creation, render, test send, approval, versioning"
    - "campaign launch, readiness, scheduling, A/B, frequency, budget"
    - "delivery retry, replay, rate limit, warmup, provider failover"
    - "open, click, conversion tracking, analytics, privacy impact"
    - "workflow publish, trigger, simulate, dry-run, schedule, rollback"
    - "admin config, audit, webhooks, search, bootstrap, public content"
    - "Kubernetes, Docker, env, secrets, observability, backup, restore readiness"

salesforce_baseline:
  interpretation: "Salesforce level means Marketing Cloud Engagement parity, not Account Engagement."
  baseline_products:
    email_studio:
      required_capabilities:
        - "Subscriber and list management"
        - "Data Extensions and relational audience data"
        - "Email creation, preview, testing, send classification, send logging"
        - "Triggered, transactional, user-initiated, and guided sends"
        - "Tracking extracts, reports, bounce and engagement tracking"
    content_builder:
      required_capabilities:
        - "Reusable assets, templates, dynamic content, personalization"
        - "Versioning, approvals, brand controls, foldering, collaboration"
        - "Preview, validation, inbox/client testing, reusable blocks"
    journey_builder:
      required_capabilities:
        - "Multi-step cross-channel journeys"
        - "Entry sources, decisions, waits, goals, exits, versioning"
        - "Testing, simulation, activation, history, analytics"
    automation_studio:
      required_capabilities:
        - "Scheduled, triggered, file-drop, SQL, import, extract, script, verification, and send activities"
        - "Operational run history, retry, notifications, and dependencies"
    data_extensions_contact_model:
      required_capabilities:
        - "Contact model, data relationships, subscriber keys, retention, import/export, queryable datasets"
    tracking_reporting:
      required_capabilities:
        - "Open, click, bounce, unsubscribe, complaint, conversion, aggregate tracking, extracts, dashboards"
    deliverability:
      required_capabilities:
        - "Domain verification, SPF, DKIM, DMARC, reputation, suppression, bounce classification, warmup"
    api_admin_security_governance:
      required_capabilities:
        - "REST APIs, package/app management, business units, roles, audit, governance, compliance controls"
  source_reliability: "Official Salesforce documentation URLs supplied in the implementation plan and used as baseline references."

