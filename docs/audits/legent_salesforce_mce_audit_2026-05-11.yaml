    test_percent: 50
    salesforce_mapping: "Provider routing, send execution, retry, replay, rate limit, warmup."
    strengths:
      - "Provider selection considers priority, rate, health, cost, and routing rules."
      - "SMTP-compatible adapter support covers many providers: SMTP, SES, SendGrid, Mailgun, Brevo, Postmark, SparkPost, Postal, Haraka, Postfix, MailHog, Mailpit, docker-mail-server, custom SMTP."
    gaps:
      - "Needs stronger retry/replay idempotency evidence, provider failover tests, bounce classification, queue backpressure, per-tenant throttles, warmup governance, and MTA-grade deliverability operations."
    risks:
