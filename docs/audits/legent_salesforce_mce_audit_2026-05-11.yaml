    strengths:
      - "Deterministic variant assignment uses stable SHA-256 bucketing with holdout and weighted variants."
      - "Good campaign domain breadth: launch, engine, workflow, send jobs."
    gaps:
      - "Needs Salesforce-level send classification, publication calendar, dependency graph, throttling proof, budget/frequency enforcement, approval evidence, rollback, and enterprise scale tests."
  - module: "delivery-service"
    module_readiness_percent: 55
    salesforce_parity_percent: 50
