    strengths:
      - "Broad audience domain with controllers for data extensions, imports, lists, subscribers, segments, preferences, suppression, eligibility."
      - "13 migrations and 12 entities indicate real persistence model rather than placeholder API only."
    gaps:
      - "Data Extensions are below Salesforce Contact Builder depth: relationship modeling, retention rules, query tooling, import validation, field-level governance, and high-volume operations need expansion."
      - "Consent evidence and suppression governance need stronger auditability."
  - module: "content-service"
