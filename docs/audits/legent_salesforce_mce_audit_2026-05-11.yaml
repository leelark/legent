    functional_percent: 62
    architecture_percent: 54
    security_percent: 58
    ops_percent: 48
    test_percent: 55
    salesforce_mapping: "Open, click, conversion tracking, ingestion, analytics, funnels, segments."
    strengths:
      - "Open/click/conversion ingestion, Redis plus DB dedupe, URL hashing, and Kafka publishing exist."
    gaps:
      - "Salesforce tracking parity needs bounce/complaint/unsubscribe extract depth, reporting exports, privacy controls, rollups, reconciliation, and reliable event persistence."
    risks:
      - "DB save exception is caught, then event publish path can continue."
      - "Fallback workspace-default can contaminate tenant/workspace analytics if missing workspace is accepted."
  - module: "automation-service"
    module_readiness_percent: 54
    salesforce_parity_percent: 50
    functional_percent: 60
    architecture_percent: 55
    security_percent: 58
    algorithm_percent: 48
    test_percent: 50
    salesforce_mapping: "Journey Builder and workflow automation."
    strengths:
      - "Workflow definitions, workflow instances, graph validation, async config with tenant context decorator."
    gaps:
      - "Far below Salesforce Journey Builder and Automation Studio: no mature entry sources, decisions, waits, goals, re-entry controls, branch analytics, simulation, version rollback, file-drop automation, SQL automation, or activity marketplace."
  - module: "deliverability-service"
    module_readiness_percent: 50
    salesforce_parity_percent: 48
    functional_percent: 58
    architecture_percent: 50
    security_percent: 56
    ops_percent: 45
    test_percent: 50
    salesforce_mapping: "Domain verification, DMARC, reputation, spam checks, suppression."
    strengths:
      - "Domain, DMARC, reputation, insights, and suppression APIs exist."
      - "Mock DNS mode is configurable and should be blocked from production by runtime guard."
    gaps:
      - "Needs production DNS validation coverage, BIMI, MTA-STS, TLS-RPT, blocklist monitoring, feedback loops, ISP reputation dashboards, warmup planning, bounce taxonomy, and deliverability recommendations."
  - module: "platform-service"
    module_readiness_percent: 52
    salesforce_parity_percent: 50
    functional_percent: 58
    architecture_percent: 52
    security_percent: 56
    ops_percent: 48
    test_percent: 45
    salesforce_mapping: "Webhooks, search, notifications, platform config."
    strengths:
      - "Webhook retry, notifications, search, and config primitives exist."
    gaps:
      - "Needs app/package ecosystem, API key governance, webhook replay UI, schema registry, rate limits, developer portal, and strong audit controls."
    risks:
      - "WebhookRetryService uses CompletableFuture.runAsync without a configured bounded executor."
  - module: "frontend"
    module_readiness_percent: 48
    salesforce_parity_percent: 54
    functional_percent: 62
    architecture_percent: 48
    security_percent: 54
    ux_percent: 61
    test_percent: 35
    salesforce_mapping: "Marketing app UX: workspace shell, audiences, content, campaigns, tracking, automation, deliverability, settings."
    strengths:
      - "Wide route coverage and application-like workspace flows, not only landing pages."
      - "HTTP-only-cookie migration is partially reflected in API client comments."
    gaps:
      - "Build timed out twice, E2E cannot run without app server, route duplication between workspace and app areas needs rationalization, and UX maturity remains below Salesforce for builders, previews, reporting, admin governance, and guided operations."
    risks:
      - "api-client imports getStoredTenantId, while auth comments indicate tenant data moved to HTTP-only cookies and getStoredTenantId is currently not a reliable source."
  - module: "infrastructure_devops"
    module_readiness_percent: 52
    salesforce_parity_percent: 45
    functional_percent: 58
    architecture_percent: 52
    security_percent: 50
    ops_percent: 50
    test_percent: 45
    salesforce_mapping: "Production deployment, operations, CI, backup, observability, secrets, scale."
    strengths:
      - "Docker Compose local stack, Kubernetes manifests, HPAs, service health checks, Prometheus alert rules, CI/security workflow, and backup scripts exist."
    gaps:
      - "No proven Helm/Terraform, multi-region, disaster recovery, external secret manager, canary/blue-green, SLO dashboards, complete restore proof, or runtime load results."
    risks:
      - "Frontend build timeout, missing frontend compose healthcheck, weak ClickHouse backup, dev default internal API token."

