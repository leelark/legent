overall_scores:
  weighted_overall_percent: 59
  salesforce_feature_parity_percent: 51
  functional_completeness_percent: 68
  architecture_scale_reliability_percent: 62
  security_compliance_percent: 64
  observability_operations_percent: 55
  ux_workflow_maturity_percent: 61
  test_evidence_percent: 58
  infra_readiness_percent: 52
  algorithm_maturity_percent: 56
  production_readiness_percent: 45
  explanation: "Legent has broad module coverage and many real domain objects/endpoints, but depth is far below Salesforce MCE in Journey Builder, Automation Studio, Contact/Data Extensions, enterprise governance, deliverability intelligence, analytics, and operational proof."

module_scores:
  - module: "shared_libraries"
    module_readiness_percent: 66
    salesforce_parity_percent: 55
    functional_percent: 72
    architecture_percent: 66
    security_percent: 70
    test_percent: 62
    notes: "Security and common libraries show meaningful hardening: JWT secret validation, runtime config guard, tenant task decorator, shared Kafka/cache support. Needs stronger contract tests, policy docs, and production-grade platform SDK surface."
    key_evidence:
      - "shared/legent-security/src/main/java/com/legent/security/JwtTokenProvider.java validates JWT secret length."
      - "shared/legent-security/src/main/java/com/legent/security/SecurityProperties.java validates secret and CORS configuration."
      - "shared/legent-security/src/main/java/com/legent/security/async/TenantTaskDecorator.java clears TenantContext after async work."
  - module: "identity-service"
    module_readiness_percent: 68
    salesforce_parity_percent: 55
    functional_percent: 72
    architecture_percent: 65
    security_percent: 72
    ux_percent: 58
    test_percent: 55
    salesforce_mapping: "Admin/security foundation: auth, users, cookies, tenant/workspace identity."
    strengths:
      - "Signup null-company prior critical appears fixed by validation before slug generation."
      - "HTTP-only cookie based session posture with SameSite Strict."
    gaps:
      - "No complete Salesforce-style business unit hierarchy, SCIM, SAML/OIDC enterprise federation, delegated administration, or package/app governance."
      - "Cookie auth with CSRF disabled needs explicit threat model and regression tests."
  - module: "foundation-service"
    module_readiness_percent: 66
    salesforce_parity_percent: 58
    functional_percent: 74
    architecture_percent: 64
    security_percent: 66
    ops_percent: 60
    test_percent: 58
    salesforce_mapping: "Tenant, admin config, audit, feature flags, branding, public content, bootstrap."
    strengths:
      - "Largest endpoint surface and broad admin/config/audit coverage."
      - "Runtime configuration guard reduces accidental mock/placeholder production use."
    gaps:
      - "Audit and admin governance is not yet Salesforce enterprise-grade: no complete policy engine, approval evidence, retention matrix, or multi-BU governance model."
  - module: "audience-service"
    module_readiness_percent: 64
    salesforce_parity_percent: 60
    functional_percent: 70
    architecture_percent: 62
    security_percent: 64
    algorithm_percent: 55
    test_percent: 56
