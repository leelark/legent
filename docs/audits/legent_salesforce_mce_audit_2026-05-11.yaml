critical_blockers:
  - id: "P0-FRONTEND-BUILD-TIMEOUT"
    severity: "critical"
    area: "frontend_release"
    status: "open"
    evidence:
      - "Command cd frontend; npm run build timed out after about 604 seconds."
      - "Second command cd frontend; npm run build timed out after about 904 seconds."
      - "No useful build log was produced before timeout; Node worker processes from the timed-out build had to be killed."
    impact: "Cannot reliably produce production frontend artifact or prove CI release path."
    required_fix: "Profile Next build, identify hung step, remove duplicate/import cycle or slow static generation cause, set CI timeout and build telemetry, then require passing build in CI."
    owner_module: "frontend"
  - id: "P0-DOCKER-FRONTEND-HEALTHCHECK"
    severity: "critical"
    area: "infra_devops"
    status: "open"
    evidence:
      - "docker-compose.yml:618 defines frontend service."
      - "docker-compose.yml:664-665 has gateway depending on frontend condition service_healthy."
      - "No frontend healthcheck was found under frontend service."
    impact: "Local full-stack startup can hang or fail; release smoke tests become unreliable."
    required_fix: "Add frontend healthcheck or change gateway dependency to service_started with an external readiness probe."
    owner_module: "docker-compose.yml"
  - id: "P0-TRACKING-OUTBOX-CONSISTENCY"
    severity: "critical"
    area: "tracking_analytics"
    status: "open"
    evidence:
      - "services/tracking-service/src/main/java/com/legent/tracking/service/TrackingIngestionService.java:52-55 saves event then publishes with outbox comment."
      - "services/tracking-service/src/main/java/com/legent/tracking/service/TrackingIngestionService.java:173 defines saveEventToDatabase."
      - "services/tracking-service/src/main/java/com/legent/tracking/service/TrackingIngestionService.java:197 catches exceptions from database save."
      - "services/tracking-service/src/main/java/com/legent/tracking/service/TrackingIngestionService.java:207 publishes with transaction synchronization."
    impact: "A failed DB save can still allow downstream event publish path, causing analytics mismatch and broken outbox guarantee."
    required_fix: "Let DB save failures abort the transaction, implement durable outbox table plus relay, add tests for DB failure, duplicate event, and publish failure."
    owner_module: "tracking-service"
  - id: "P0-CLICKHOUSE-BACKUP-NOT-A-BACKUP"
    severity: "critical"
    area: "backup_restore"
    status: "open"
    evidence:
      - "scripts/ops/backup-restore.ps1:41-44 uses clickhouse-client --query SHOW DATABASES for clickhouse backup."
    impact: "Analytics/tracking data cannot be restored from backup; disaster recovery promise is invalid."
    required_fix: "Implement real ClickHouse backup/export, object storage snapshot, restore validation, and scheduled restore drill."
    owner_module: "scripts/ops/backup-restore.ps1"
  - id: "P0-INTERNAL-API-TOKEN-DEV-DEFAULT"
    severity: "critical"
    area: "security_compliance"
    status: "open"
    evidence:
      - "docker-compose.yml:420 uses LEGENT_INTERNAL_API_TOKEN default legent-internal-dev-token."
      - "docker-compose.yml:578 uses LEGENT_INTERNAL_API_TOKEN default legent-internal-dev-token."
    impact: "If compose or derived config is reused outside local, internal endpoints have predictable shared secret."
    required_fix: "Fail closed for non-local profiles, remove default token from production-like compose, and enforce runtime guard on token value."
    owner_module: "docker-compose.yml and shared runtime config"

bugs:
  - id: "BUG-CONTENT-SERVICE-CLIENT-EXECUTOR-LEAK"
    severity: "high"
    status: "open"
    module: "delivery-service"
    evidence:
      - "services/delivery-service/src/main/java/com/legent/delivery/client/ContentServiceClient.java:79 creates newSingleThreadScheduledExecutor per cache insert."
      - "services/delivery-service/src/main/java/com/legent/delivery/client/ContentServiceClient.java:80 schedules eviction but never shuts executor down."
    impact: "Thread/executor leak under campaign traffic; can exhaust memory or threads."
    fix: "Use shared ScheduledExecutorService bean, Caffeine cache with TTL, or Spring cache abstraction."
  - id: "BUG-CONTENT-SERVICE-CLIENT-ONSTATUS-NULL"
    severity: "high"
    status: "open"
    module: "delivery-service"
    evidence:
      - "services/delivery-service/src/main/java/com/legent/delivery/client/ContentServiceClient.java:62-66 onStatus handlers were found."
      - "Manual review found handlers returning null instead of a Mono."
    impact: "4xx/5xx responses can fail unpredictably in Reactor and hide content fetch errors."
    fix: "Return Mono.error for failure or response.releaseBody().then(Mono.empty()) only if intentionally suppressing the error."
  - id: "BUG-WEBHOOK-RETRY-COMMON-POOL"
    severity: "high"
    status: "open"
    module: "platform-service"
    evidence:
      - "services/platform-service/src/main/java/com/legent/platform/service/WebhookRetryService.java:57 scheduled retry loop."
      - "services/platform-service/src/main/java/com/legent/platform/service/WebhookRetryService.java:70 uses CompletableFuture.runAsync without an executor."
    impact: "Webhook retry load can consume the JVM common pool and interfere with unrelated async work."
    fix: "Use bounded ThreadPoolTaskExecutor with queue limits, tenant limits, metrics, jitter, and backpressure."
  - id: "BUG-E2E-NOT-SELF-CONTAINED"
    severity: "high"
    status: "open"
    module: "frontend"
    evidence:
      - "frontend/playwright.config.ts has no webServer configuration."
      - "http://localhost:3000 timed out during audit."
      - "cd frontend; npm run test:e2e was skipped because app server was unavailable."
    impact: "E2E cannot be trusted as repeatable release evidence."
    fix: "Add Playwright webServer, deterministic seed/bootstrap, and CI smoke subset."
  - id: "BUG-FRONTEND-TENANT-HEADER-MIGRATION-RISK"
    severity: "medium"
    status: "needs_runtime_validation"
    module: "frontend"
    evidence:
      - "frontend/src/lib/api-client.ts sends workspace/env headers and imports getStoredTenantId."
      - "Auth migration comments indicate tenant/session data moved to HTTP-only cookies; getStoredTenantId is not reliable as local state."
    impact: "Some API calls may miss X-Tenant-Id or use stale workspace context, causing 400s or tenant isolation defects."
    fix: "Centralize tenant/workspace bootstrap from server session, add tests for login reload, workspace switch, and API request headers."
  - id: "BUG-TRACKING-WORKSPACE-DEFAULT-FALLBACK"
    severity: "high"
    status: "open"
    module: "tracking-service"
    evidence:
      - "services/tracking-service/src/main/java/com/legent/tracking/service/TrackingIngestionService.java:277-278 returns workspace-default when workspace is missing."
    impact: "Missing workspace can contaminate analytics and tenant reporting."
    fix: "Reject or quarantine missing workspace events unless a verified mapping exists."
  - id: "BUG-PROVIDER-FALLBACK-PATH-UNCLEAR"
    severity: "medium"
    status: "needs_runtime_validation"
    module: "delivery-service"
    evidence:
      - "ProviderSelectionStrategy has scoring and fallback concepts, but current selection path needs explicit failure-mode tests."
    impact: "Provider failover may not behave as operators expect under partial provider failure."
    fix: "Add tests for unhealthy primary, quota exhaustion, route-affinity conflicts, circuit breaker open, and no-provider states."
  - id: "BUG-DOCS-API-CATALOG-GENERATION"
    severity: "low"
    status: "open"
    module: "documentation"
    evidence:
      - "Generated API catalog support docs include malformed path extraction where @PreAuthorize text is concatenated into endpoint rows."
    impact: "Developer docs can mislead API users."
    fix: "Generate API catalog from Spring OpenAPI or actuator mappings instead of regex-only parsing."

security_risks:
  - id: "SEC-ACTUATOR-PERMITALL"
    severity: "high"
    status: "needs_environment_gate"
    modules: ["all Spring services"]
    evidence: "Multiple service SecurityConfig classes permit /actuator/**."
    risk: "Metrics, health, environment, or management endpoints may become public if gateway/ingress is misconfigured."
    mitigation: "Expose only health/readiness publicly; protect metrics/admin actuator with network policy, auth, or separate management port."
  - id: "SEC-CSRF-COOKIE-AUTH"
    severity: "high"
    status: "needs_threat_model"
    modules: ["identity-service", "frontend", "gateway"]
    evidence: "Services use stateless security and CSRF disabled while auth uses HTTP-only cookies with SameSite Strict."
    risk: "SameSite Strict helps, but future cross-site flows, redirects, subdomains, or relaxed cookie settings can reintroduce CSRF risk."
    mitigation: "Document CSRF model, keep SameSite Strict, add CSRF token if needed, add regression tests for unsafe methods."
  - id: "SEC-INTERNAL-TOKEN-DEFAULT"
    severity: "critical"
    status: "open"
    modules: ["docker-compose.yml", "deliverability-service", "audience-service"]
    evidence: "LEGENT_INTERNAL_API_TOKEN defaults to legent-internal-dev-token in compose."
    risk: "Predictable internal API authorization if default escapes local."
    mitigation: "Require explicit strong token for non-local; block known dev defaults at runtime."
  - id: "SEC-SECRETS-MANAGEMENT"
    severity: "high"
    status: "open"
    modules: ["infrastructure/kubernetes"]
    evidence: "Kubernetes secrets use stringData placeholders."
    risk: "Manual secret handling and accidental commit/deploy risk."
    mitigation: "Use External Secrets, cloud KMS, SealedSecrets, or SOPS with rotation policy."
  - id: "SEC-TRACKING-PUBLIC-ENDPOINTS"
    severity: "medium"
    status: "needs_abuse_controls"
    modules: ["tracking-service"]
    evidence: "Tracking pixel/click endpoints are intentionally public."
    risk: "Bot traffic, replay, forged events, and privacy issues can pollute analytics."
    mitigation: "Signed tracking tokens, rate limits, bot filtering, IP/user-agent heuristics, privacy retention controls."
  - id: "SEC-WEBHOOK-DELIVERY"
    severity: "medium"
    status: "needs_hardening"
    modules: ["platform-service"]
    evidence: "Webhook delivery and retry path signs outbound payloads and logs delivery."
    risk: "Needs SSRF protections, endpoint allow/block policy, payload limits, retry abuse limits, and secret rotation."
    mitigation: "Validate endpoint scheme/host/IP, block private networks by default, add per-tenant rate limits and replay controls."
  - id: "SEC-OPEN_SEARCH_LOCAL_SECURITY_DISABLED"
    severity: "medium"
    status: "local_only_allowed"
    modules: ["docker-compose.yml"]
    evidence: "OpenSearch local stack disables security plugin."
    risk: "Unsafe if local compose is promoted or exposed."
    mitigation: "Keep local-only, document, and enforce production runtime profile guard."

