    functional_percent: 68
    architecture_percent: 61
    security_percent: 63
    ux_percent: 60
    test_percent: 58
    salesforce_mapping: "Email Studio and Content Builder: templates, blocks, assets, emails, workflow, versions."
    strengths:
      - "High endpoint coverage across templates, template versions, email studio, content blocks, assets, and workflow."
      - "Real versioning and workflow APIs exist."
    gaps:
      - "Missing mature drag/drop builder, client previews, spam/inbox tests, robust asset governance, dynamic content authoring, and Salesforce-like collaboration/foldering depth."
      - "Content render path needs production load, safety, and preview evidence."
  - module: "campaign-service"
    module_readiness_percent: 65
    salesforce_parity_percent: 61
    functional_percent: 72
    architecture_percent: 64
    security_percent: 64
    algorithm_percent: 65
    test_percent: 59
