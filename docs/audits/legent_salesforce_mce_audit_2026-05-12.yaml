critical_items:
  - id: "TRK-001"
    severity: "high"
    status: "implemented_in_this_change"
    modules: ["tracking-service"]
    issue: "TrackingEventConsumer assigned workspace-default when payload and envelope lacked workspaceId."
    impact: "Malformed events could contaminate analytics under a fake default workspace."
    fix: "Consumer now logs and skips missing-workspace events before idempotency, aggregation, or ClickHouse write."
    validation: "Added TrackingEventConsumerTest missing-workspace regression."
  - id: "REL-001"
    severity: "high"
    status: "implemented_in_this_change"
    modules: ["scripts/ops/release-gate.ps1"]
    issue: "Release gate used mvnw test without clean/package."
    impact: "Stale target/classes resources could mask source packaging problems."
    fix: "Backend release gate now runs mvnw clean package -T 1C."
    validation: "Targeted script inspection plus backend tests planned after patch."
  - id: "FE-001"
    severity: "medium"
    status: "open"
    modules: ["frontend"]
    issue: "Frontend lint passes with 302 no-explicit-any warnings."
    impact: "API contract drift and runtime UI bugs are more likely."
    fix: "Add typed DTOs and typed API hooks by module; start with core API client, admin, audience, template studio, and campaign pages."
  - id: "OPS-001"
    severity: "medium"
    status: "open"
    modules: ["operations", "infrastructure"]
    issue: "No live production smoke/load/restore transcript was available."
    impact: "GA cannot be certified from local validation only."
    fix: "Run release-gate with RunSyntheticSmoke against target URL, then restore drill and high-volume load profile."

