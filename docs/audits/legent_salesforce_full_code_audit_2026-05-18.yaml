what_to_do_to_reach_salesforce_level:
  must_have:
    - area: "Journey Builder"
      work:
        - "Build marketer-grade visual canvas with version activation, testing, goals, exits, re-entry controls, journey health, rejected contacts, and analytics."
        - "Add message activities beyond email: SMS, WhatsApp, push, in-app, and advertising audiences."
        - "Add custom activity SDK, event entry admin, API event entry, and reusable entry sources."
    - area: "Automation Studio"
      work:
        - "Implement SQL Query activity with safe SQL subset, target data extension write modes, concurrency limits, preview/explain, and audit."
        - "Implement file transfer, import, data extract, filter, verification, script-equivalent safe runtime, wait, report, and send activities."
        - "Add automation run logs, retries, activity outputs, dependency graph, and step-level observability."
    - area: "Contact Builder and Data Extensions"
      work:
        - "Add contact populations, attribute groups, linked data extensions, restricted values, data lineage, retention enforcement, contact deletion, and synchronized data source strategy."
    - area: "Email Studio and Content Builder"
      work:
        - "Build folder/shared-item governance, drag/drop content builder, locked brand blocks, render previews, seed sends, inbox placement, advanced A/B, send classifications, and unsubscribe compliance workflows."
    - area: "Deliverability"
      work:
        - "Add live provider feedback loops, blocklist feeds, BIMI, MTA-STS, TLS-RPT, seed/inbox placement, ISP throttling profiles, dedicated IP/warmup operations, and domain/IP reputation dashboards."
    - area: "Analytics and Data Views"
      work:
        - "Create Salesforce-like system data views for sent/open/click/bounce/unsubscribe/journey/activity/automation, cross-channel dashboards, exports, and attribution."
    - area: "Enterprise Security and Operations"
      work:
        - "Produce GA evidence pack, strict release gate, image provenance, live egress proof, gitleaks/Trivy transcripts, restore drills, SLO alerts, RBAC matrix, audit retention, and customer admin docs."

what_to_do_to_be_best_in_world:
  differentiators:
    - "Real-time event streaming CDP with deterministic and probabilistic identity resolution, consent-aware graph edges, and explainable audience membership."
    - "AI campaign copilot that drafts strategy, builds audience, creates content, predicts deliverability risk, proposes journey, and requires human approval for risky actions."
    - "Autonomous deliverability autopilot that adjusts provider/domain/IP/domain-rate plans using live reputation, bounce, complaint, spam placement, and engagement signals."
    - "Causal experimentation platform with holdouts, incrementality, budget guardrails, bandits, and post-send lift reports."
    - "World-class journey simulation with synthetic customers, load projection, failure injection, cost estimate, and deliverability forecast before activation."
    - "Unified channel runtime for email, SMS, WhatsApp, push, in-app, web personalization, ads, direct mail, and sales/service tasks."
    - "Compliance-by-construction: consent ledger, purpose limitation, regional residency, DSAR deletion, audit export, and legal policy simulation."
    - "Operational trust center: live status, tenant SLOs, incident timelines, release evidence, data retention proof, and security attestations."
    - "Developer platform with OpenAPI, SDKs, sandbox tenants, test event replay, workflow extension marketplace, and signed webhooks."
    - "Cost/performance optimizer that chooses provider/channel/time/content based on margin, SLA, risk, and user fatigue."

phase_plan_to_surpass_salesforce:
  phase_0_release_safety:
    duration: "0 to 2 weeks"
    goal: "Make current product safely demonstrable and private-beta ready."
    exit_criteria:
      - "Strict release gate passes with real evidence or explicitly beta-scoped exceptions."
      - "Audience V17 reviewed mapping validated."
      - "Images digest-pinned with SBOM/signature/provenance evidence."
      - "Live smoke, restore drill, monitoring, TLS, admission, and security scan transcripts attached."
      - "No P1 blockers open."
  phase_1_salesforce_email_core:
    duration: "2 to 6 weeks"
    goal: "Reach strong Email Studio and Contact Builder parity for email-only customers."
    work:
      - "Folder/shared-item governance for templates, assets, lists, and data extensions."
      - "Send classifications, unsubscribe/preference center hardening, global suppression UI."
      - "Advanced content builder UX and multi-client preview."
      - "Data extension SQL Query activity MVP with safe write modes."
      - "High-volume live load proof with ClickHouse and provider-like pressure."
    target_scores:
      salesforce_parity_percent: 75
      public_ga_readiness_percent: 65
  phase_2_journey_automation_parity:
    duration: "6 to 12 weeks"
    goal: "Close Journey Builder and Automation Studio gaps."
    work:
      - "Journey canvas with goals, exits, re-entry, test mode, entry source admin, and journey analytics."
      - "Automation activities: SQL query, import, file transfer, data extract, filter, wait, verification, send email."
      - "Run logs, activity-level retries, queue/concurrency controls, and audit."
      - "Custom activity SDK design."
    target_scores:
      automation_parity_percent: 75
      salesforce_parity_percent: 80
  phase_3_enterprise_deliverability:
    duration: "12 to 20 weeks"
    goal: "Become trustworthy for enterprise volume."
    work:
      - "Live feedback loops for providers, complaint/bounce reconciliation, ISP throttling, blocklist feeds."
      - "BIMI, MTA-STS, TLS-RPT, DMARC aggregate parsing, seed/inbox placement integrations."
      - "IP/domain pool operations, warmup plans, engagement-based suppression, fatigue controls."
      - "Deliverability command center and incident playbooks."
    target_scores:
      deliverability_parity_percent: 82
      production_evidence_percent: 75
  phase_4_multi_channel_customer_graph:
    duration: "20 to 32 weeks"
    goal: "Move beyond email-only platform."
    work:
      - "Customer identity graph, CDP event/profile store, consent ledger, segmentation across channels."
      - "SMS, WhatsApp, push, in-app, ads audiences, web personalization, and channel analytics."
      - "Unified fatigue, preference, suppression, and attribution model."
    target_scores:
      salesforce_parity_percent: 86
      best_in_world_readiness_percent: 60
  phase_5_agentic_optimization:
    duration: "32 to 48 weeks"
    goal: "Surpass Salesforce on AI-assisted marketing operations."
    work:
      - "AI campaign creation with policy-aware planning and approval."
      - "Send-time/content/provider optimization with causal lift measurement."
      - "Journey simulator, deliverability forecast, budget risk forecast, and failure injection."
      - "Autonomous operations with rollback, approvals, and audit."
    target_scores:
      salesforce_parity_percent: 92
      best_in_world_readiness_percent: 78
  phase_6_world_class_operating_system:
    duration: "48 to 72 weeks"
    goal: "Best-in-world enterprise marketing platform."
    work:
      - "Global active-active production proof, tenant SLOs, trust center, compliance automation, marketplace, SDKs, full data residency."
      - "Benchmark against Salesforce, Adobe, Braze, Iterable, HubSpot, Klaviyo, and enterprise ESPs."
      - "Third-party audits, SOC2/ISO roadmap, deliverability partner certifications, and public status evidence."
    target_scores:
      salesforce_parity_percent: 96
      best_in_world_readiness_percent: 90

