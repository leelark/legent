executive_summary:
  verdict: "Legent has a serious enterprise email platform foundation, but it is not yet a public GA Salesforce replacement."
  overall_scores:
    salesforce_parity_percent: 68
    functional_readiness_percent: 78
    controlled_private_beta_readiness_percent: 82
    limited_low_volume_live_readiness_percent: 65
    public_multi_tenant_ga_readiness_percent: 49
    best_in_world_readiness_percent: 41
    engineering_test_health_percent: 86
    production_evidence_readiness_percent: 38
  live_decision:
    public_ga: "NO_GO"
    salesforce_replacement_claim: "NO_GO"
    controlled_private_beta: "GO_WITH_CONSTRAINTS"
    limited_low_volume_live: "NO_GO until target egress, image provenance, GA evidence, live smoke/load, restore, security, TLS, and monitoring proof are attached"
  strongest_areas:
    - "Ten real backend services plus five shared modules exist: identity, foundation, audience, content, campaign, delivery, tracking, automation, deliverability, and platform."
    - "Tenant/workspace context, JWT conflict handling, unsafe-method origin guard, RBAC annotations, event idempotency, bounded audience/send chunking, rendered-content references, and delivery rate/warmup leases are materially stronger than MVP."
    - "Email sending core has campaign launch checks, audience resolution, batch recipient rows, send safety, delivery provider routing, rate reservations, warmup, retries, message logs, tracking URLs, and analytics."
    - "Local validation is strong: backend tests, frontend lint/build/E2E, route map, Compose config, production overlay, sanitizer tests, and npm high audit passed during this audit."
  weakest_areas:
    - "Salesforce-class Journey Builder and Automation Studio parity is partial, especially SQL Query activity, file transfer, data extract, verification activity, advanced journey goals/exits/re-entry, and multi-channel actions."
    - "No full Data Cloud/CDP, identity graph, real-time cross-channel activation, SMS/WhatsApp/push/ad channel delivery, or agentic marketing platform exists yet."
    - "Deliverability is not yet ISP-grade at Salesforce scale without live feedback loops, blocklist feeds, seed/inbox placement vendors, BIMI, MTA-STS, TLS-RPT, dedicated IP pool operations, and live reputation telemetry."
    - "Production release evidence remains incomplete: image digests/SBOM/signatures/provenance, external egress, live load, restore drill, security scan transcript, TLS/admission proof, and alert routing proof."
    - "Several large frontend/backend files create regression risk and slow future change."

