      status: "open"
      area: "release"
      finding: "Public GA blocked by missing real production evidence."
      impact: "Cannot prove production safety, capacity, restore, external egress, image provenance, security scans, TLS, or monitoring."
      next_action: "Collect target evidence and run strict release gate with GA, egress, image, smoke, load, restore, and security proof."
    - id: "P1-AUDIENCE-V17-MAPPING"
      status: "open"
      area: "data migration"
      finding: "Audience V17 guard requires reviewed workspace mapping for legacy data-extension rows."
