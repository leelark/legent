# ─────────────────────────────────
# Nginx API Gateway Configuration
# ─────────────────────────────────

upstream foundation_service {
    server host.docker.internal:8081;
}

upstream audience_service {
    server host.docker.internal:8082;
}

upstream content_service {
    server host.docker.internal:8083;
}

upstream campaign_service {
    server host.docker.internal:8084;
}

upstream delivery_service {
    server host.docker.internal:8085;
}

upstream tracking_service {
    server host.docker.internal:8086;
}

upstream automation_service {
    server host.docker.internal:8087;
}

upstream deliverability_service {
    server host.docker.internal:8088;
}

upstream admin_service {
    server host.docker.internal:8089;
}

server {
    listen 80;
    server_name localhost;

    # ── Security Headers ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Rate Limiting ──
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # ── Foundation Service ──
    location /api/v1/configs {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://foundation_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/feature-flags {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://foundation_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/tenants {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://foundation_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/health {
        proxy_pass http://foundation_service;
        include /etc/nginx/proxy_params.conf;
    }

    # ── Audience Service ──
    location /api/v1/subscribers {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://audience_service;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/segments {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://audience_service;
        include /etc/nginx/proxy_params.conf;
    }

    # ── Campaign Service ──
    location /api/v1/campaigns {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://campaign_service;
        include /etc/nginx/proxy_params.conf;
    }

    # ── Frontend (Proxy to Next.js dev server) ──
    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
