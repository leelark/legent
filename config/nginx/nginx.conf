upstream foundation_service {
    zone foundation_service 64k;
    server foundation-service:8081 resolve;
}

upstream identity_service {
    zone identity_service 64k;
    server identity-service:8089 resolve;
}

upstream audience_service {
    zone audience_service 64k;
    server audience-service:8082 resolve;
}

upstream content_service {
    zone content_service 64k;
    server content-service:8090 resolve;
}

upstream campaign_service {
    zone campaign_service 64k;
    server campaign-service:8083 resolve;
}

upstream delivery_service {
    zone delivery_service 64k;
    server delivery-service:8084 resolve;
}

upstream tracking_service {
    zone tracking_service 64k;
    server tracking-service:8085 resolve;
}

upstream automation_service {
    zone automation_service 64k;
    server automation-service:8086 resolve;
}

upstream deliverability_service {
    zone deliverability_service 64k;
    server deliverability-service:8087 resolve;
}

upstream platform_service {
    zone platform_service 64k;
    server platform-service:8088 resolve;
}

upstream frontend_service {
    zone frontend_service 64k;
    server frontend:3000 resolve;
}

resolver 127.0.0.11 valid=30s ipv6=off;
resolver_timeout 5s;

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
# High-throughput rate limit for tracking endpoints (legitimate high volume from emails)
limit_req_zone $binary_remote_addr zone=tracking_limit:10m rate=200r/s;

server {
    listen 80;
    server_name localhost;

    # Security Headers - Complete Hardening
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content Security Policy - Strict
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' http://localhost:8080 http://gateway:8080; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    
    # HSTS - Enable for production HTTPS (disabled for local HTTP)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Additional security headers
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Download-Options "noopen" always;
    add_header X-Request-ID $request_id always;

    location = /nginx-health {
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location ^~ /api/v1/auth {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://identity_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/users {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://identity_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/configs {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://foundation_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/feature-flags {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://foundation_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/tenants {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://foundation_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/core {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://foundation_service;
        include /etc/nginx/proxy_params.conf;
    }

    # Fix 29: Webhook and Search functionality moved to platform-service
    # Foundation-service retains: tenant provisioning, config, feature flags, audit
    # Platform-service owns: webhook dispatch, notifications, OpenSearch indexing

    location ^~ /api/v1/admin/webhooks {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://platform_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/admin/search {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://platform_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/admin {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://foundation_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/health {
        proxy_pass http://foundation_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/subscribers {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://audience_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/segments {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://audience_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/imports {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://audience_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/lists {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://audience_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/data-extensions {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://audience_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/suppressions {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://audience_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/templates {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://content_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/content {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://content_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/assets {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://content_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/emails {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://content_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/campaigns {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://campaign_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/providers {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://delivery_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/workflows {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://automation_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/workflow-definitions {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://automation_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/tracking {
        # Higher throughput rate limit for tracking endpoints (emails generate legitimate high volume)
        limit_req zone=tracking_limit burst=50 nodelay;
        proxy_pass http://tracking_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/analytics {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://tracking_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/events {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://tracking_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/deliverability {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://deliverability_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/reputation {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://deliverability_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/dmarc {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://deliverability_service;
        include /etc/nginx/proxy_params.conf;
    }

    location ^~ /api/v1/platform {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://platform_service;
        include /etc/nginx/proxy_params.conf;
    }

    location / {
        proxy_pass http://frontend_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
