apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: legent-backend-pdb
  namespace: legent
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      tier: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: legent-frontend-pdb
  namespace: legent
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: legent-observability-pdb
  namespace: legent
spec:
  minAvailable: 1
  selector:
    matchLabels:
      tier: observability
