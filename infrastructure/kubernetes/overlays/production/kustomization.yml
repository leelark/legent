apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: legent

resources:
  - ../../base
  - ../../ingress
  - ../../observability
  - external-secrets.yml
  - network-policy.yml
  - resource-budget.yml
  - pod-disruption-budgets.yml

patches:
  - path: delete-base-secret.yml
    target:
      kind: Secret
      name: legent-secrets
  - path: delete-base-ingress-policy.yml
    target:
      kind: NetworkPolicy
      name: allow-ingress-to-legent-apps
  - path: deployment-rollout-patch.yml
    target:
      kind: Deployment
