apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: legent-secrets
  namespace: legent
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: legent-production-secrets
  target:
    name: legent-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: DB_USER
      remoteRef:
        key: legent/production/postgres
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: legent/production/postgres
        property: password
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: legent/production/postgres
        property: password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: legent/production/redis
        property: password
    - secretKey: LEGENT_SECURITY_JWT_SECRET
      remoteRef:
        key: legent/production/jwt
        property: signing_key
    - secretKey: LEGENT_TRACKING_SIGNING_KEY
      remoteRef:
        key: legent/production/tracking
        property: signing_key
    - secretKey: LEGENT_DELIVERY_CREDENTIAL_KEY
      remoteRef:
        key: legent/production/delivery
        property: credential_key
    - secretKey: LEGENT_DELIVERY_ENCRYPTION_SALT
      remoteRef:
        key: legent/production/delivery
        property: encryption_salt
    - secretKey: CLICKHOUSE_PASSWORD
      remoteRef:
        key: legent/production/clickhouse
        property: password
    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: legent/production/object-storage
        property: access_key
    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: legent/production/object-storage
        property: secret_key
    - secretKey: MAIL_USERNAME
      remoteRef:
        key: legent/production/mail
        property: username
    - secretKey: MAIL_PASSWORD
      remoteRef:
        key: legent/production/mail
        property: password
    - secretKey: CORS_ALLOWED_ORIGINS
      remoteRef:
        key: legent/production/web
        property: cors_allowed_origins
    - secretKey: LEGENT_INTERNAL_API_TOKEN
      remoteRef:
        key: legent/production/internal-api
        property: token
    - secretKey: ALERTMANAGER_PLATFORM_WEBHOOK_URL
      remoteRef:
        key: legent/production/alerting
        property: webhook_url
    - secretKey: ALERTMANAGER_PLATFORM_PAGER_URL
      remoteRef:
        key: legent/production/alerting
        property: pager_url
