apiVersion: v1
kind: ConfigMap
metadata:
  name: legent-global-region-policy
  namespace: legent
data:
  LEGENT_GLOBAL_REGION: us-east-1
  LEGENT_GLOBAL_TOPOLOGY_MODE: ACTIVE_ACTIVE
  LEGENT_GLOBAL_ROLE: ACTIVE
  LEGENT_GLOBAL_PRIMARY_REGION: us-east-1
  LEGENT_GLOBAL_STANDBY_REGIONS: ""
  LEGENT_GLOBAL_ACTIVE_REGIONS: us-east-1,eu-west-1
  LEGENT_GLOBAL_RPO_TARGET_MINUTES: "5"
  LEGENT_GLOBAL_RTO_TARGET_MINUTES: "15"
  LEGENT_GLOBAL_PROMOTION_STATE: MULTI_ACTIVE_HEALTHY
  LEGENT_GLOBAL_FAILOVER_STATE: POLICY_CONTROLLED
  LEGENT_DATA_RESIDENCY_FAIL_CLOSED: "true"
  LEGENT_CONNECTOR_TRAFFIC_DEFAULT: DRY_RUN
  LEGENT_OPTIMIZATION_DEFAULT_MODE: SUGGEST_ONLY
  LEGENT_SECRET_PROVIDER_MODE: EXTERNAL
