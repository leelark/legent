apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: legent-global-secrets
  namespace: legent
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: legent-global-secrets
  target:
    name: legent-global-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: GLOBAL_KMS_KEY_REF
      remoteRef:
        key: legent/global/active-active/kms
        property: key_ref
    - secretKey: REGIONAL_REPLICATION_TOKEN
      remoteRef:
        key: legent/global/active-active/replication
        property: token
    - secretKey: CONNECTOR_MARKETPLACE_MASTER_KEY
      remoteRef:
        key: legent/global/marketplace
        property: master_key
