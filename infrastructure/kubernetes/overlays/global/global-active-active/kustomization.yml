apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: legent

resources:
  - ../../production
  - regional-config.yml
  - external-secret-refs.yml

labels:
  - includeSelectors: true
    pairs:
      legent.com/global-overlay: global-active-active
      legent.com/global-role: active
      legent.com/global-topology: active-active

commonAnnotations:
  legent.com/topology-mode: ACTIVE_ACTIVE
  legent.com/region-set: us-east-1,eu-west-1
  legent.com/failover-default: policy-controlled

patches:
  - path: global-scheduling-patch.yml
    target:
      kind: Deployment
