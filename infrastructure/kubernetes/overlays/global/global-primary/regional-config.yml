apiVersion: v1
kind: ConfigMap
metadata:
  name: legent-global-region-policy
  namespace: legent
data:
  LEGENT_GLOBAL_REGION: us-east-1
  LEGENT_GLOBAL_TOPOLOGY_MODE: ACTIVE_WARM
  LEGENT_GLOBAL_ROLE: PRIMARY
  LEGENT_GLOBAL_PRIMARY_REGION: us-east-1
  LEGENT_GLOBAL_STANDBY_REGIONS: us-west-2
  LEGENT_GLOBAL_ACTIVE_REGIONS: us-east-1
  LEGENT_GLOBAL_RPO_TARGET_MINUTES: "15"
  LEGENT_GLOBAL_RTO_TARGET_MINUTES: "60"
  LEGENT_GLOBAL_PROMOTION_STATE: PRIMARY_HEALTHY
  LEGENT_GLOBAL_FAILOVER_STATE: LOCKED
  LEGENT_DATA_RESIDENCY_FAIL_CLOSED: "true"
  LEGENT_CONNECTOR_TRAFFIC_DEFAULT: DRY_RUN
  LEGENT_OPTIMIZATION_DEFAULT_MODE: SUGGEST_ONLY
  LEGENT_SECRET_PROVIDER_MODE: EXTERNAL
