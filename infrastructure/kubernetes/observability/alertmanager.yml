apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-legent-routing
  namespace: legent
data:
  alertmanager.yml: |
    route:
      receiver: platform-primary
      group_by: ["alertname", "severity", "team"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity="critical"
          receiver: platform-pager
          repeat_interval: 30m
    receivers:
      - name: platform-primary
        webhook_configs:
          - url: ${ALERTMANAGER_PLATFORM_WEBHOOK_URL}
            send_resolved: true
      - name: platform-pager
        webhook_configs:
          - url: ${ALERTMANAGER_PLATFORM_PAGER_URL}
            send_resolved: true
