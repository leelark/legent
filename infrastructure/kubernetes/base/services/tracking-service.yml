apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracking-service
  namespace: legent
  labels:
    app: tracking-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tracking-service
  template:
    metadata:
      labels:
        app: tracking-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tracking-service
          image: legent/tracking-service:latest
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: legent-config
            - secretRef:
                name: legent-secrets
          env:
            - name: DB_NAME
              value: "legent_tracking"
            - name: SPRING_DATASOURCE_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: legent-secrets
                  key: CLICKHOUSE_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 20
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            failureThreshold: 30
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: tracking-service
  namespace: legent
  labels:
    app: tracking-service
spec:
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: 8085
      protocol: TCP
  selector:
    app: tracking-service
