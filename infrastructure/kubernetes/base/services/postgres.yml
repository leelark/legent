apiVersion: apps/v1
kind: Deployment
metadata:
  name: legent-postgres
  namespace: legent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_USER
              value: legent
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: legent-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: legent-postgres
  namespace: legent
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
