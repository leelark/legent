apiVersion: apps/v1
kind: Deployment
metadata:
  name: legent-opensearch
  namespace: legent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.11.0
          ports:
            - containerPort: 9200
          env:
            - name: cluster.name
              value: legent-cluster
            - name: node.name
              value: legent-node1
            - name: discovery.type
              value: single-node
            - name: OPENSEARCH_JAVA_OPTS
              value: -Xms512m -Xmx512m
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: legent-opensearch
  namespace: legent
spec:
  ports:
    - port: 9200
      targetPort: 9200
  selector:
    app: opensearch
