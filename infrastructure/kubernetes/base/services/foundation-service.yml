apiVersion: apps/v1
kind: Deployment
metadata:
  name: foundation-service
  namespace: legent
  labels:
    app: foundation-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: foundation-service
  template:
    metadata:
      labels:
        app: foundation-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: foundation-service
          image: legent/foundation-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: legent-config
            - secretRef:
                name: legent-secrets
          env:
            - name: DB_NAME
              value: "legent_foundation"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8081
            failureThreshold: 30
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: foundation-service
  namespace: legent
  labels:
    app: foundation-service
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: foundation-service
