apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-service
  namespace: legent
  labels:
    app: platform-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-service
  template:
    metadata:
      labels:
        app: platform-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8088"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: platform-service
          image: legent/platform-service:latest
          ports:
            - containerPort: 8088
          envFrom:
            - configMapRef:
                name: legent-config
            - secretRef:
                name: legent-secrets
          env:
            - name: DB_NAME
              value: "legent_platform"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 20
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            failureThreshold: 30
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: platform-service
  namespace: legent
  labels:
    app: platform-service
spec:
  type: ClusterIP
  ports:
    - port: 8088
      targetPort: 8088
      protocol: TCP
  selector:
    app: platform-service
