apiVersion: v1
kind: Secret
metadata:
  name: legent-secrets
  namespace: legent
type: Opaque
stringData:
  # Database credentials — override via external secret manager in production
  DB_PASSWORD: "${DB_PASSWORD}"
  DB_USER: "${DB_USER}"

  # Redis
  REDIS_PASSWORD: "${REDIS_PASSWORD}"

  # JWT signing key — minimum 64 hex chars (256-bit)
  LEGENT_SECURITY_JWT_SECRET: "${LEGENT_SECURITY_JWT_SECRET}"

  # MinIO object storage
  MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
  MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"

  # Mail credentials
  MAIL_USERNAME: "${MAIL_USERNAME}"
  MAIL_PASSWORD: "${MAIL_PASSWORD}"

  # CORS — comma-separated allowed origins
  CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS}"
