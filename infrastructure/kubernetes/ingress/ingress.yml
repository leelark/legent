apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: legent-ingress
  namespace: legent
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1s"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.legent.com, https://admin.legent.com, http://app.legent.local"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Tenant-Id, X-Correlation-Id, X-Request-Id"
spec:
  ingressClassName: nginx
  rules:
    - host: api.legent.local
      http:
        paths:
          # Identity
          - path: /api/v1/(auth|users)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: identity-service
                port:
                  number: 8089
          # Foundation
          - path: /api/v1/(configs|feature-flags|tenants|admin|health)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: foundation-service
                port:
                  number: 8081
          # Audience
          - path: /api/v1/(subscribers|lists|data-extensions|segments|imports|suppressions)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: audience-service
                port:
                  number: 8082
          # Content
          - path: /api/v1/(templates|content-blocks|assets|content|emails)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: content-service
                port:
                  number: 8090
          # Campaign
          - path: /api/v1/(campaigns|sends)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: campaign-service
                port:
                  number: 8083
          # Delivery
          - path: /api/v1/(providers|delivery-status)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: delivery-service
                port:
                  number: 8084
          # Tracking (pixel + analytics + reports)
          - path: /api/v1/(tracking|track|reports|analytics)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: tracking-service
                port:
                  number: 8085
          # Automation
          - path: /api/v1/(workflows|triggers|workflow-definitions)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: automation-service
                port:
                  number: 8086
          # Deliverability
          - path: /api/v1/(deliverability|reputation|dmarc)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: deliverability-service
                port:
                  number: 8087
          # Platform
          - path: /api/v1/platform(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: platform-service
                port:
                  number: 8088
    - host: app.legent.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
