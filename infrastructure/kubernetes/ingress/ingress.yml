apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: legent-ingress
  namespace: legent
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.legent.com, https://admin.legent.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Tenant-Id, X-Workspace-Id, X-Environment-Id, X-Correlation-Id, X-Request-Id"
    nginx.ingress.kubernetes.io/server-snippet: |
      location ~* ^/actuator(/|$) {
        return 404;
      }
      location = /api/v1/imports/internal/start {
        return 404;
      }
      location = /api/v1/data-extensions/query-activities/internal {
        return 404;
      }
      location = /api/v1/content/rendered-content/internal {
        return 404;
      }
      location = /api/v1/deliverability/suppressions/internal {
        return 404;
      }
      location ^~ /api/v1/deliverability/suppressions/internal/ {
        return 404;
      }
      location ~ ^/api/v1/content/[^/]+/render/internal$ {
        return 404;
      }
      location ~ ^/api/v1/content/rendered-content/[^/]+/internal$ {
        return 404;
      }
      location ~ ^/api/v1/content/send-governance-policies/[^/]+/internal$ {
        return 404;
      }
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.legent.com
        - app.legent.com
      secretName: legent-public-tls
  rules:
    - host: api.legent.com
      http:
        paths:
          # Identity
          - path: /api/v1/(auth|users|sso|scim/v2|federation)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: identity-service
                port:
                  number: 8089
          # Platform admin aliases
          - path: /api/v1/admin/(webhooks|search)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: platform-service
                port:
                  number: 8088
          # Content public landing pages
          - path: /api/v1/public/landing-pages(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: content-service
                port:
                  number: 8090
          # Foundation
          - path: /api/v1/(configs|feature-flags|tenants|core|health|audit-logs|compliance|performance-intelligence|global|differentiation)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: foundation-service
                port:
                  number: 8081
          # Keep broad admin/public routes shorter than service-specific routes above.
          - path: /api/v1/admin(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: foundation-service
                port:
                  number: 8081
          - path: /api/v1/public(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: foundation-service
                port:
                  number: 8081
          # Audience
          - path: /api/v1/(audience|subscribers|lists|data-extensions|segments|imports|preferences|suppressions)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: audience-service
                port:
                  number: 8082
          # Content
          - path: /api/v1/(templates|content|assets|emails|personalization-tokens|brand-kits|landing-pages)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: content-service
                port:
                  number: 8090
          # Campaign
          - path: /api/v1/(campaigns|send-jobs)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: campaign-service
                port:
                  number: 8083
          # Delivery
          - path: /api/v1/(providers|delivery)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: delivery-service
                port:
                  number: 8084
          # Automation
          - path: /api/v1/(workflows|workflow-definitions|automation-studio)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: automation-service
                port:
                  number: 8086
          # Deliverability
          - path: /api/v1/(deliverability|reputation|dmarc)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: deliverability-service
                port:
                  number: 8087
          # Platform
          - path: /api/v1/platform(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: platform-service
                port:
                  number: 8088
    - host: app.legent.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: legent-tracking-ingress
  namespace: legent
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/limit-rps: "200"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.legent.com, https://admin.legent.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Tenant-Id, X-Workspace-Id, X-Environment-Id, X-Correlation-Id, X-Request-Id"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.legent.com
      secretName: legent-public-tls
  rules:
    - host: api.legent.com
      http:
        paths:
          # Tracking pixel, click, and conversion ingestion.
          # Reviewed high-throughput posture mirrors local Nginx tracking_limit: 200r/s.
          - path: /api/v1/tracking(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: tracking-service
                port:
                  number: 8085
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: legent-tracking-analytics-ingress
  namespace: legent
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.legent.com, https://admin.legent.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Tenant-Id, X-Workspace-Id, X-Environment-Id, X-Correlation-Id, X-Request-Id"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.legent.com
      secretName: legent-public-tls
  rules:
    - host: api.legent.com
      http:
        paths:
          # Analytics and websocket reads stay on the normal API rate posture.
          - path: /api/v1/analytics(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: tracking-service
                port:
                  number: 8085
          - path: /ws/analytics(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: tracking-service
                port:
                  number: 8085
