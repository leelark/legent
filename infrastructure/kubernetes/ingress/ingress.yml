apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: legent-ingress
  namespace: legent
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1s"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.legent.local
      http:
        paths:
          # Foundation
          - path: /api/v1/(configs|feature-flags|tenants|health)
            pathType: ImplementationSpecific
            backend:
              service:
                name: foundation-service
                port:
                  number: 8081
          # Audience
          - path: /api/v1/(subscribers|lists|data-extensions|segments|imports)
            pathType: ImplementationSpecific
            backend:
              service:
                name: audience-service
                port:
                  number: 8082
          # Content
          - path: /api/v1/(templates|content-blocks|assets)
            pathType: ImplementationSpecific
            backend:
              service:
                name: content-service
                port:
                  number: 8083
          # Campaign
          - path: /api/v1/(campaigns|sends)
            pathType: ImplementationSpecific
            backend:
              service:
                name: campaign-service
                port:
                  number: 8084
          # Tracking
          - path: /api/v1/(tracking|reports)
            pathType: ImplementationSpecific
            backend:
              service:
                name: tracking-service
                port:
                  number: 8086
          # Automation
          - path: /api/v1/(workflows|triggers)
            pathType: ImplementationSpecific
            backend:
              service:
                name: automation-service
                port:
                  number: 8087
    - host: app.legent.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
