name: ci-security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Backend tests with coverage
        run: ./mvnw -T1 -Pcoverage -DskipITs=true verify
      - name: Backend coverage threshold summary
        shell: pwsh
        run: ./scripts/ops/validate-jacoco-coverage.ps1
      - name: Backend integration tests
        if: ${{ vars.LEGENT_RUN_BACKEND_ITS == 'true' }}
        run: ./mvnw -T1 -Pcoverage,integration-tests -DskipITs=false verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Frontend unit coverage
        run: npm run test:coverage
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Frontend sanitizer regression
        run: npm run test:e2e:sanitize
        env:
          PLAYWRIGHT_SKIP_WEB_SERVER: "1"
      - name: Frontend production build with telemetry
        run: npm run build:ci
        env:
          LEGENT_BUILD_TIMEOUT_MS: "900000"
      - name: Frontend visual smoke
        run: npm run test:e2e:visual
        env:
          CI: "true"
      - name: Upload frontend visual smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-visual-smoke
          path: frontend/test-results/test-e2e-visual-*
          if-no-files-found: ignore
          retention-days: 14
      - name: Frontend full Chromium E2E
        run: npm run test:e2e:chromium
        env:
          CI: "true"
      - run: npm audit --omit=dev --audit-level=high

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker Compose config smoke
        run: docker compose --env-file .env.example config --quiet
      - name: Docker Compose safety validator self-test
        shell: pwsh
        run: ./scripts/ops/validate-compose-safety.ps1 -SelfTest
      - name: Docker Compose health validator self-test
        shell: pwsh
        run: ./scripts/ops/validate-compose-health.ps1 -SelfTest
      - name: Docker Compose safety validator
        shell: pwsh
        run: ./scripts/ops/validate-compose-safety.ps1 -ComposeEnvFile .env.example
      - name: Gateway route map validator
        shell: pwsh
        run: ./scripts/ops/validate-route-map.ps1
      - name: Gateway route map fixture harness
        shell: pwsh
        run: ./scripts/ops/test-route-map-validator.ps1
      - name: Production Kustomize render
        run: kubectl kustomize infrastructure/kubernetes/overlays/production > /tmp/legent-production.yml
      - name: Production overlay validator
        shell: pwsh
        run: ./scripts/ops/validate-production-overlay.ps1
      - name: Production image supply-chain checklist and manifest template
        shell: pwsh
        run: ./scripts/ops/write-image-supply-chain-checklist.ps1 -OutputPath /tmp/legent-image-supply-chain-checklist.md -ManifestOutputPath /tmp/legent-image-evidence-manifest.template.json
      - name: Upload production image evidence checklist and template
        uses: actions/upload-artifact@v4
        with:
          name: legent-image-supply-chain-checklist
          path: |
            /tmp/legent-image-supply-chain-checklist.md
            /tmp/legent-image-evidence-manifest.template.json

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repository artifact hygiene
        shell: pwsh
        run: ./scripts/ops/validate-repo-artifact-hygiene.ps1
      - name: Release evidence validator self-test
        shell: pwsh
        run: ./scripts/ops/test-release-evidence-validators.ps1
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
      - name: Dependency scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Filesystem SBOM
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: legent-fs-sbom.cdx.json
      - name: Upload filesystem SBOM
        uses: actions/upload-artifact@v4
        with:
          name: legent-fs-sbom
          path: legent-fs-sbom.cdx.json
