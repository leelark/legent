what_to_do_to_reach_salesforce_level:
  must_fix_first:
    - "Keep service-to-service JWT readiness and durable rendered-content snapshot paths under stack-level regression tests."
    - "Attach production egress, image digest/signature/provenance, GA evidence, live load, restore, security scan, and monitoring proof."
    - "Run full backend, frontend build, smoke E2E, route, compose, Kustomize, release-gate validation."
  product_parity_work:
    - "Contact Builder parity: relationships, populations, attribute groups, send relationships, query activity, retention automation."
    - "Email Studio parity: mature builder, template governance, folder/library permissions, previews, test sends, validation matrix."
    - "Journey Builder parity: entry events, goals, exits, re-entry, wait-until, decision splits, engagement splits, path optimizer, analytics."
    - "Automation Studio parity: import/query/filter/send/script/file-transfer activities, schedules, dependencies, history, retry."
    - "Analytics parity: message/journey/funnel dashboards, exports, attribution, cohorting, engagement scoring."
    - "Deliverability parity: provider feedback loops, ISP blocklist/postmaster feeds, BIMI/MTA-STS/TLS-RPT, warmup playbooks."
    - "Enterprise parity: SSO/SCIM certification, RBAC/business units, audit/legal hold, APIs/SDKs, admin policy, marketplace."
  platform_parity_work:
    - "Global multi-region HA with failover drills."
    - "Data retention, backup/restore, disaster recovery, incident response, SLO burn alerts."
    - "Tenant isolation verification, security scans, pen test, supply-chain signing, SBOM, provenance."

what_to_do_to_be_best_in_world:
  differentiators:
    - "Autonomous deliverability guard: stops unsafe sends before reputation damage using live provider/ISP/reputation telemetry."
    - "Explainable AI campaign copilot: predicts risk, revenue, fatigue, deliverability, content quality, and recommended send plan."
    - "Real-time customer graph: streaming identity, consent, engagement, commerce, product, support, and web behavior."
    - "Cross-channel orchestrator: email, SMS, WhatsApp, mobile push, in-app, web, ads, sales/service tasks, direct mail."
    - "Experimentation operating system: multi-armed bandits, holdouts, incrementality, causal lift, budget/frequency constraints."
    - "Zero-trust tenant isolation: row-level policies, workload identity, service mesh/mTLS, tenant-aware encryption keys."
    - "Open integration ecosystem: connector SDK, marketplace, sandbox, webhook replay, schema registry, event catalog."
    - "Self-healing operations: anomaly detection, auto rollback, replay simulation, synthetic journeys, chaos tests."
  non_negotiables:
    - "Never claim guaranteed inbox placement."
    - "Never allow new sender/domain 10 lakh emails in 10 hours without warmup, authenticated DNS, capacity, suppressions, sharding, observability."
    - "Make all high-volume actions bounded, observable, replayable, cancellable, and idempotent."

phase_plan:
  phase_0_blocker_fix:
    duration: "1-2 weeks"
    goal: "Make current product safe for controlled beta smoke."
    status: "mostly_completed_in_source_2026-05-17"
    exit_criteria:
      - "Service-auth fixed and campaign launch readiness focused tests pass. Completed in source; stack smoke still required."
      - "Delivery retry content reference route/storage fixed and focused contract tests pass. Completed in source; live replay proof still required."
      - "Automation workflow lock uses atomic SET NX PX and tests cover concurrent resume. Completed."
      - "Route, Compose, env, production overlay, and focused backend tests pass. Frontend build/E2E were not rerun in this implementation pass."
    work_items:
      - "Completed: signed service JWT contract for campaign readiness clients."
      - "Completed: content-service rendered snapshot create/read endpoint and durable store."
      - "Completed: delivery content cache scoped by tenant/workspace/reference."
      - "Reduced: Data Extension preview scans a bounded multi-page window; full query activity remains Phase 2 work."
  phase_1_ga_hardening:
    duration: "2-6 weeks"
    goal: "Evidence-backed low-volume production readiness."
    exit_criteria:
      - "Strict release gate passes with egress, digest/signature/provenance, GA evidence."
      - "Live smoke/load/restore/security/monitoring evidence attached."
      - "Audience V17 production mapping process proven in staging."
    work_items:
      - "Digest-pin production images and attach SBOM/provenance/signature."
      - "Complete external egress evidence."
      - "Run restore drill, synthetic smoke, alert routing, TLS/admission proof."
      - "Run live 10k/100k campaign load with tracking/ClickHouse proof."
  phase_2_salesforce_core_email_parity:
    duration: "2-4 months"
    goal: "Reach credible Salesforce email-core parity."
    exit_criteria:
      - "Email builder, Contact Builder, Query Activity, Send Flow, Journey MVP, deliverability dashboard pass product QA."
      - "1M-recipient controlled load passes with bounded queue, provider, render, tracking, and analytics metrics."
    work_items:
      - "Build query activity engine and data extension relationship model."
      - "Build mature email builder and rendering QA matrix."
      - "Build send calendar, blackout windows, seed lists, suppression hierarchy."
      - "Add provider-specific bounce/complaint taxonomy and feedback loops."
  phase_3_enterprise_scale_and_operations:
    duration: "4-8 months"
    goal: "Enterprise multi-tenant production platform."
    exit_criteria:
      - "Multi-region DR, failover, SLO, incident, audit, compliance, pen test, and live scale evidence pass."
      - "10M-recipient staged campaign profile passes with provider-safe warmup and throttling."
    work_items:
      - "Shard rate keys and queues; add distributed scheduler/leases."
      - "Tenant-aware encryption/key management."
      - "Advanced observability dashboards and automated runbooks."
      - "SCIM/SSO conformance certification."
  phase_4_ai_and_cross_channel:
    duration: "6-12 months"
    goal: "Compete with Salesforce growth areas."
    exit_criteria:
      - "AI optimization has offline/online evaluation and model governance."
      - "Journeys support SMS/push/WhatsApp/web/ad events."
    work_items:
      - "Build engagement scoring, send-time optimization, fatigue model, content risk model."
      - "Add cross-channel adapters and consent controls."
      - "Add journey experimentation/path optimizer and attribution."
  phase_5_best_in_world:
    duration: "12-24 months"
    goal: "Beat Salesforce in safety, speed, explainability, and openness."
    exit_criteria:
      - "Autonomous deliverability guard prevents unsafe sends in live operations."
      - "Open marketplace and data graph support large customer ecosystem."
      - "AI copilot produces auditable, measurable lift without unsafe claims."
    work_items:
      - "Build marketplace/connector SDK."
      - "Build real-time customer graph and event catalog."
      - "Build explainable AI planner and autonomous operations loop."

