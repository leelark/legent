executive_summary:
  overall_salesforce_parity_percent: 66
  overall_functional_readiness_percent: 73
  controlled_private_beta_readiness_percent: 78
  low_volume_single_tenant_live_readiness_percent: 61
  public_multi_tenant_ga_readiness_percent: 48
  best_in_world_readiness_percent: 39
  verdict: "Not ready for public GA or Salesforce-replacement positioning. The locally actionable P1 source blockers found in this audit are fixed, but external production evidence and major Salesforce parity gaps remain."
  no_go_for_live_reasons:
    - "Production promotion still lacks external egress evidence, digest-pinned image evidence, live smoke/load/restore/security/monitoring proof, and target ClickHouse performance proof."
    - "Audience V17 production mapping still requires operator-reviewed workspace metadata before migrating real legacy rows."
    - "Salesforce parity gaps remain in Journey Builder depth, Automation Studio query/import activities, Contact Builder relationship model, AI optimization, cross-channel messaging, enterprise analytics, and operational evidence."
  strongest_current_areas:
    - "Microservice coverage is broad: identity, foundation, audience, content, campaign, delivery, tracking, automation, deliverability, platform, shared security/kafka/cache/common."
    - "Tenant/workspace context is now strong in shared filters and many repositories/controllers."
    - "High-volume send path has chunked audience handoff, non-tenant Kafka keys, batch retries, payload caps, content references, warmup/rate reservation logic, and launch readiness hooks."
    - "Campaign readiness now uses short-lived signed service JWTs for delivery/deliverability calls, and delivery retry content now resolves tenant/workspace-scoped durable rendered snapshots from content-service."
    - "Tracking has signed URL support, Redis dedupe, outbox, raw-event retention, and ClickHouse-oriented analytics design."
    - "Release tooling includes route-map, production overlay, GA evidence, env, egress, and load-evidence validators."
  weakest_current_areas:
    - "No real Salesforce-class Data Cloud/CDP or cross-channel orchestration."
    - "Automation and journey engine are functional but not yet enterprise-grade for complex multi-branch journeys at scale."
    - "AI features are mostly heuristics and panels, not trained/validated optimization systems."
    - "Frontend is broad but type safety and advanced builder UX lag enterprise expectations."
    - "Production operational proof is intentionally blocked pending real evidence."

