critical_findings:
  - id: "P1-CAMPAIGN-SERVICE-AUTH-NOT-WIRED"
    severity: "P1"
    status: "resolved_in_source_2026-05-17"
    modules:
      - "services/campaign-service"
      - "services/delivery-service"
      - "services/deliverability-service"
      - "infrastructure"
      - "docker-compose.yml"
    evidence:
      - "Replaced missing opaque `LEGENT_SERVICE_AUTH_BEARER_TOKEN` config with `ServiceAuthTokenProvider`, which mints short-lived signed JWTs through shared `JwtTokenProvider`."
      - "DeliveryReadinessClient and DeliverabilityReadinessClient now call existing RBAC-protected readiness APIs with service JWT Authorization headers."
      - "Deliverability auth-check endpoint now requires `deliverability:read`, matching the service JWT role model."
      - "Internal API token validation now rejects the documented `.env.example` placeholder and uses constant-time comparison for internal endpoints."
      - "Source regression scan found no remaining service-auth bearer-token config references."
    impact: "Campaign launch readiness source path no longer depends on missing opaque bearer-token config. Target runtime smoke is still required before GA."
    fix:
      - "Run Compose/Kubernetes readiness smoke against live delivery and deliverability services."
      - "Keep service JWT TTL, role claims, and RBAC tests under release gate."
  - id: "P1-DELIVERY-RETRY-CONTENT-REFERENCE-ROUTE-MISSING"
    severity: "P1"
    status: "resolved_in_source_2026-05-17"
    modules:
      - "services/delivery-service"
      - "services/content-service"
      - "services/campaign-service"
    evidence:
      - "Content-service now persists rendered content snapshots with tenant/workspace scope, reference metadata, hashes, TTL, and purge support."
      - "Content-service exposes internal snapshot create/read routes guarded by `X-Internal-Token` and tenant/workspace context."
      - "Campaign rendered-content references are written through content-service snapshots when inline content is omitted or payload caps require references; optional per-recipient snapshots remain default-off until batch/outbox snapshot storage is added."
      - "Delivery retry recovery now calls content-service by tenant/workspace/reference, caches by scoped key, and validates returned scope metadata before dispatch."
      - "Delivery now falls through from Redis misses to content-service for `cr_` references and uses bounded in-process content cache eviction."
      - "Source regression scan found no remaining `/api/v1/content/campaign/{campaignId}` fallback calls."
    impact: "Retry content recovery no longer depends on a missing route or campaign-only cache key. Live high-volume retry/replay evidence remains required before GA."
    fix:
      - "Add stack-level contract smoke and retention/load evidence for rendered snapshots."
  - id: "P1-PRODUCTION-EVIDENCE-MISSING"
    severity: "P1"
    status: "open"
    modules:
      - "infrastructure"
      - "scripts"
      - "docs"
    evidence:
      - "Production overlay validator passes but warns images are tag-only, not digest-pinned."
      - "Blocked memory records missing external egress, GA evidence, live load, restore, monitoring, supply-chain proof."
    impact: "No public GA promotion. Runtime safety cannot be proven from source alone."
    fix:
      - "Attach egress evidence, digest/signature/provenance, live smoke/load/restore/security/monitoring evidence."
      - "Run release gate with strict evidence flags."
  - id: "P1-LIVE-SCALE-PROOF-MISSING"
    severity: "P1"
    status: "open"
    modules:
      - "services/campaign-service"
      - "services/delivery-service"
      - "services/tracking-service"
      - "scripts/load"
    evidence:
      - "Load harness exists, but no target-like result attached."
      - "Current source still uses per-recipient delivery handoff/render loop inside bounded batch."
    impact: "Cannot claim Salesforce-scale or safe high-volume send readiness."
    fix:
      - "Run staged live load: 10k, 100k, 1M, 10M recipient profiles with render, Kafka, provider, tracking, ClickHouse, and DB metrics."
  - id: "P1-AUDIENCE-V17-PRODUCTION-MAPPING-BLOCKER"
    severity: "P1"
    status: "open"
    modules:
      - "services/audience-service"
      - "scripts/ops"
      - "docs/operations"
    evidence:
      - "Memory records audience V17 requires operator-reviewed mapping metadata."
    impact: "Production migration can fail closed until reviewed workspace mapping exists."
    fix:
      - "Run staging preflight, validate reviewed metadata, and verify target workspaces from authoritative workspace source."

bug_and_debt_inventory:
  bugs:
    - id: "BUG-001"
      severity: "P1"
      title: "Campaign readiness service auth missing/not wired"
      owner_module: "services/campaign-service"
      status: "resolved_in_source_2026-05-17"
      described_in: "critical_findings.P1-CAMPAIGN-SERVICE-AUTH-NOT-WIRED"
    - id: "BUG-002"
      severity: "P1"
      title: "Delivery retry content client calls missing content-service route"
      owner_module: "services/delivery-service"
      status: "resolved_in_source_2026-05-17"
      described_in: "critical_findings.P1-DELIVERY-RETRY-CONTENT-REFERENCE-ROUTE-MISSING"
    - id: "BUG-003"
      severity: "P2"
      title: "Automation workflow resume lock is non-atomic"
      owner_module: "services/automation-service"
      status: "resolved_in_source_2026-05-17"
      evidence: "WorkflowEngine uses `cacheService.setIfAbsent(lockKey, ...)`; CacheService delegates to Redis `setIfAbsent` with TTL."
      impact: "Concurrent resume double-execution race reduced through atomic lock acquisition."
      fix: "Completed with CacheService and WorkflowEngine focused tests."
    - id: "BUG-004"
      severity: "P2"
      title: "Data extension preview query can return incorrect filtered/sorted subset"
      owner_module: "services/audience-service"
      status: "reduced_2026-05-17"
      evidence: "DataExtensionService preview now scans a bounded 5,000-row preview window across pages before filtering/projects/sorting."
      impact: "First-page false negatives are fixed within the preview scan window; this still is not Salesforce Query Activity parity."
      fix: "Build safe SQL/query DSL over data extension records with field validation, pagination, and explain limits."
    - id: "BUG-005"
      severity: "P2"
      title: "Content-reference feature disabled by default while payload cap can require it"
      owner_module: "services/campaign-service"
      status: "resolved_in_source_2026-05-17"
      evidence: "Rendered snapshots are durable in content-service, and `SendExecutionService` now creates required references for oversized/reference-only payloads even when optional reference snapshots are disabled."
      impact: "Large personalized emails can use durable references without enabling optional per-recipient snapshots for every inline send."
      fix: "Completed; batch/outbox snapshot storage and live send/load proof still required."
    - id: "BUG-006"
      severity: "P2"
      title: "Delivery retry content cache is not explicitly tenant/workspace scoped"
      owner_module: "services/delivery-service"
      status: "resolved_in_source_2026-05-17"
      evidence: "Delivery ContentServiceClient caches rendered content by tenantId:workspaceId:referenceId."
      impact: "Campaign ID collision risk removed from retry content cache."
      fix: "Completed with delivery client tests."
