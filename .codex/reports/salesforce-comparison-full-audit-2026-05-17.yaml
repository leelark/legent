  artifact_path: ".codex/reports/salesforce-comparison-full-audit-2026-05-17.yaml"
  generated_on: "2026-05-17"
  timezone: "Asia/Calcutta"
  repository_root: "C:/Users/leelark.saxena/Desktop/Legent - v1.0.2"
  product: "Legent v1.0.2"
  comparator: "Salesforce Marketing Cloud Engagement / Marketing Cloud email, journey, automation, data, analytics, and enterprise operations capabilities"
  audit_mode:
    - "Automated whole-tree text scan over current working tree."
    - "Manual inspection of high-risk source paths for tenant isolation, launch readiness, delivery retry, automation, tracking, routing, and infrastructure."
    - "Current source compared against official Salesforce product/documentation capability baseline."
  caveats:
    - "Scores are engineering estimates from source, tests, docs, and local validation evidence. They are not production telemetry."
    - "Generated/build directories were excluded. Binary files were inventoried but not text-parsed."
    - "Real secret files were not read. `.env` and credential-style files were skipped by policy."
    - "No live production traffic, ISP reputation data, restore drill transcript, penetration test, or full high-volume load result was available."
    - "Salesforce is a mature multi-cloud enterprise platform. A score of 100 means practical parity for the named capability, not identical implementation."

