executive_summary:
  verdict: "Legent is a broad and serious enterprise email platform foundation, but it is not ready for public multi-tenant GA or Salesforce replacement positioning."
  overall_scores:
    salesforce_parity_percent: 67
    current_functional_readiness_percent: 76
    controlled_private_beta_readiness_percent: 80
    low_volume_limited_live_readiness_percent: 63
    public_multi_tenant_ga_readiness_percent: 47
    best_in_world_readiness_percent: 40
  live_decision:
    public_ga: "NO_GO"
    limited_private_beta: "GO_WITH_CONSTRAINTS"
    limited_live_low_volume: "NO_GO until artifact hygiene bug, external egress evidence, image provenance, GA evidence, and target smoke/load proof are attached."
  strongest_areas:
    - "Ten service backend shape is real: identity, foundation, audience, content, campaign, delivery, tracking, automation, deliverability, platform."
    - "Tenant/workspace context hardening is strong in shared filters and many repository/service queries."
    - "High-volume send path has audience keyset paging, bounded chunks, row-backed send batch recipients, Kafka contract validation, payload caps, durable rendered-content references, and rate/warmup reservations."
    - "Deliverability has DNS ownership challenge, SPF/DKIM/DMARC checks, suppression health, readiness gating, reputation signals, and warmup constraints."
    - "Tracking has signed open/click, Redis and DB dedupe, durable outbox, retention guardrails, ClickHouse schema contract tests, and analytics dashboards."
    - "Local validation is strong: full Maven tests, frontend lint/build/smoke/sanitizer, route/env/Compose/production overlay all pass except artifact hygiene false positive."
  weakest_areas:
    - "No Salesforce-class Data Cloud/CDP, two-way conversations, SMS/WhatsApp/push/ad audiences, or cross-channel customer graph."
    - "Journey Builder and Automation Studio parity is partial; SQL query/file-transfer/script/verifier activity engine is not Salesforce-grade."
    - "AI features are mostly heuristic or static assistance, not trained/validated optimization with causal lift and guardrails."
    - "Frontend has broad route coverage but 263 explicit-any warnings and several 800-1300 LOC route/console files."
    - "Production evidence is incomplete: egress, image digest/SBOM/signature/provenance, live load, restore, security, TLS, admission, alerting."

critical_findings:
  - id: "CRIT-2026-05-18-001"
    title: "Repository artifact hygiene validator self-matches and fails"
    severity: "P1 release-tooling"
    source:
      - "scripts/ops/validate-repo-artifact-hygiene.ps1"
      - ".github/workflows/ci-security.yml"
    evidence: "Local run failed because git grep found the literal detection string inside the validator script itself."
    impact: "Security CI can fail falsely; release confidence reduced until validator excludes itself or uses a safer fixture/pattern strategy."
    required_fix: "Exclude validator source path from its own grep, add a self-test fixture, rerun artifact hygiene and CI security workflow."
  - id: "CRIT-2026-05-18-002"
    title: "Public GA remains blocked by missing external production evidence"
    severity: "P1 release"
    source:
      - ".codex/memory/blocked-items.md"
      - ".codex/memory/unresolved-risks.md"
      - "scripts/ops/validate-ga-evidence.ps1"
      - "scripts/ops/validate-production-egress-evidence.ps1"
      - "scripts/load/phase3-high-volume-load.ps1"
    impact: "Cannot prove production safety, capacity, restore/security posture, external egress allowlist, or image provenance."
    required_fix: "Attach real target evidence, not placeholders; rerun strict release gate."
  - id: "CRIT-2026-05-18-003"
    title: "Audience V17 production migration still needs reviewed workspace mapping"
    severity: "P1 data/release"
    source:
      - "services/audience-service/src/main/resources/db/migration/V17__guard_data_extension_workspace_mapping.sql"
      - "scripts/ops/validate-audience-data-extension-workspace-mapping.ps1"
    impact: "Legacy nullable data-extension rows cannot be safely exposed in workspace-scoped production APIs without operator-reviewed mapping."
    required_fix: "Run staging preflight, verify authoritative workspaces, provide reviewed mapping metadata, rerun validator before migration."

