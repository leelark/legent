bugs_and_priority_items:
  - id: "BUG-2026-05-18-ARTIFACT-HYGIENE-SELF-MATCH"
    priority: "P1"
    module: "scripts/ops"
    status: "open"
    source: "scripts/ops/validate-repo-artifact-hygiene.ps1"
    bug: "Validator searches all tracked files for a literal phrase that exists in the validator source itself."
    impact: "False CI/security failure."
    fix: "Exclude validator script path or scan only generated/log artifacts; add regression self-test."
  - id: "RISK-2026-05-18-DELIVERY-PLACEHOLDER-DEFAULT"
    priority: "P2"
    module: "services/delivery-service"
    status: "open"
    source: "DeliveryOrchestrationService.java"
    issue: "If a send payload lacks HTML after reference resolution, service still creates placeholder HTML and default subject before inbox safety blocks placeholder content."
    impact: "Safety currently blocks placeholder body, but fail-closed behavior should happen before synthetic content exists in hot delivery path."
    fix: "Reject missing subject/htmlBody/contentReference explicitly and test no placeholder path can reach provider adapter."
  - id: "RISK-2026-05-18-AUDIENCE-MISSING-WORKSPACE-DROP"
    priority: "P2"
    module: "services/audience-service"
    status: "open"
    source: "AudienceResolutionConsumer.java"
    issue: "Missing workspaceId event logs and returns instead of surfacing to DLQ."
    impact: "Bad events can disappear without retry/DLQ observability."
    fix: "Throw a non-retryable or DLQ-routed exception with event metadata; add consumer contract test."
  - id: "DEBT-2026-05-18-FRONTEND-ANY"
    priority: "P2"
    module: "frontend"
    status: "open"
    source: "npm run lint"
    issue: "263 no-explicit-any warnings across API wrappers and workspace surfaces."
    impact: "Runtime shape bugs can escape TypeScript, especially API response drift."
    fix: "Type API clients and DTOs by domain; make lint warnings fail after baseline reduced."
  - id: "DEBT-2026-05-18-LARGE-FILES"
    priority: "P2"
    module: "frontend/backend"
    status: "open"
    source: "LOC scan"
    issue: "Multiple hot files exceed 800-1300 LOC."
    impact: "Regression risk, slower reviews, harder test isolation."
    fix: "Split when touched by domain panels, hooks, services, command handlers, and policy classes."
  - id: "BLOCKER-2026-05-18-EXTERNAL-EVIDENCE"
    priority: "P1"
    module: "release/infra"
    status: "open"
    source: ".codex/memory/blocked-items.md"
    issue: "Real production egress, GA evidence, registry image provenance, live load, restore/security/monitoring evidence absent."
    impact: "No public GA."
    fix: "Collect target artifacts and run strict release gate."

what_to_do_to_reach_salesforce_level:
  minimum_salesforce_replacement_scope:
    - "Close release blockers: artifact hygiene, target egress, image provenance, GA evidence, live load, restore/security/monitoring."
    - "Finish Contact Builder parity: relationship model, cardinality, data retention UI, safe query activity, attribute library, data views."
    - "Upgrade Automation Studio: SQL query, import/data copy, file transfer/safehouse equivalent, extract, filter, script sandbox, verification activity."
    - "Upgrade Journey Builder: rich node catalog, decision/wait/goal/exit/re-entry, versioned activation, event/API entry sources, custom activity SDK, journey analytics."
    - "Expand analytics: system data views, cross-channel dashboards, attribution, exports, BI connector, anomaly detection."
    - "Add cross-channel: SMS, WhatsApp, mobile push, ad audiences, web personalization, preference center."
    - "Add enterprise API/SDK: OpenAPI, typed SDKs, idempotent APIs, pagination, rate limits, webhooks portal, developer docs."
    - "Prove scale: 10 lakh email claims require domain/provider warmup, authenticated DNS, suppression health, sharded queues, rate evidence, and deliverability monitoring."
  target_salesforce_parity_percent_after_scope: 85
  expected_time_with_focused_team: "6-9 months for credible parity in email/journey/data/analytics, longer for Salesforce ecosystem breadth."

what_to_do_to_make_best_in_world:
  differentiators_required:
    - "Deliverability autopilot with explainable guardrails, per-ISP models, warmup/reputation simulations, seed/placement integrations, and safety-first throttling."
    - "Agentic campaign copilot that drafts strategy/content/journey but requires human approval and proves lift with experiments."
    - "Unified event/customer graph with streaming identity resolution, privacy controls, consent lineage, and zero-copy warehouse activation."
    - "Causal experimentation engine across content, channel, send time, frequency, budget, and holdouts."
    - "Real-time operations center: campaign pressure, queue lag, provider health, domain risk, compliance risk, and rollback buttons."
    - "World-class developer platform: marketplace activities/connectors, typed SDKs, local emulator, contract testing, replay, synthetic tenants."
    - "Global reliability: multi-region active-active, tenant isolation tests, chaos/load/restore evidence, SLOs, DR runbooks, supply-chain provenance."
  target_best_in_world_percent_after_scope: 92
  expected_time_with_focused_team: "12-18 months for product depth plus production evidence; longer for global ecosystem/network effects."

phase_plan:
  - phase: "0 - Stop-ship blocker closure"
    duration: "1-2 weeks"
    goals:
      - "Fix artifact hygiene validator self-match and add self-test."
      - "Collect reviewed production egress evidence or approved CNI FQDN policy."
      - "Pin production images by digest and attach SBOM/signature/provenance evidence."
      - "Produce GA evidence manifest with smoke/load/restore/security/TLS/admission/alerting."
      - "Run strict release gate and CI security workflow."
    exit_criteria:
      - "All local and CI gates pass."
      - "No placeholder evidence."
      - "Public GA readiness rises above 60%."
  - phase: "1 - Safe limited live"
    duration: "2-4 weeks"
    goals:
      - "Run target synthetic smoke and low-volume pilot."
      - "Run high-volume dry and live load in target-like environment with ClickHouse/provider/content evidence."
      - "Close Audience V17 operator mapping."
      - "Add delivery fail-closed tests for missing content."
      - "Add inbound event contract tests for all consumers."
    exit_criteria:
      - "Low-volume controlled production ready for warmed domains only."
      - "No broad egress, no unpinned images, no missing workspace events silently dropped."
  - phase: "2 - Salesforce email/core parity"
    duration: "6-10 weeks"
    goals:
      - "Contact Builder relationship/data-retention model."
      - "Dynamic send preview with real subscriber/data-extension records."
      - "Full suppression/unsubscribe/preference center."
      - "Campaign calendar, approvals, test sends, collision checks."
      - "Data views and export governance."
    exit_criteria:
      - "Core email marketing parity above 80%."
  - phase: "3 - Journey and Automation Studio parity"
    duration: "10-16 weeks"
    goals:
      - "Journey version activation, re-entry, goals, exits, waits, splits, custom activities."
      - "Automation Studio SQL query/import/extract/filter/script/verification activities."
      - "Journey analytics and replay/debugging."
      - "Custom activity SDK and marketplace controls."
    exit_criteria:
      - "Journey/automation parity above 75%."
  - phase: "4 - Cross-channel and CDP"
    duration: "12-20 weeks"
    goals:
      - "SMS, WhatsApp, push, ad audiences, web personalization channels."
      - "Unified customer graph and warehouse/lake connectors."
      - "Consent lineage across channels."
      - "Cross-channel attribution and dashboards."
    exit_criteria:
      - "Cross-channel parity above 65%, data platform parity above 70%."
  - phase: "5 - Best-in-world AI and operations"
    duration: "20-32 weeks"
    goals:
      - "Send-time/content/frequency optimization with causal measurement."
      - "Deliverability autopilot and per-ISP reputation models."
      - "Agentic campaign creation with approvals and audit."
      - "Operations cockpit, anomaly detection, automatic rollback recommendations."
    exit_criteria:
      - "Best-in-world readiness above 80% with production lift evidence."
  - phase: "6 - Global enterprise scale"
    duration: "32-52 weeks"
    goals:
      - "Multi-region active-active."
      - "DR, restore, chaos, load, penetration, supply-chain proof as recurring evidence."
      - "Partner/developer marketplace and SDK maturity."
      - "Regulated enterprise compliance packs."
    exit_criteria:
      - "Public enterprise GA with evidence-backed SLOs and compliance."

