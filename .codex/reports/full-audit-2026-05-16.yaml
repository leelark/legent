audit:
  id: full-audit-2026-05-16
  date: 2026-05-16
  repo: "Legent - v1.0.2"
  branch: "main...origin/main"
  file_count: 1192
  method:
    - "Read AGENTS.md instructions supplied in thread and .codex/bootstrap.md."
    - "Read active-work-items, blocked-items, unresolved-risks, full-audit command."
    - "Ran parallel subagent audits for security, backend event flow, frontend, infra, DB, code quality."
    - "Ran targeted rg scans for Kafka, DDL, TODO/FIXME, public routes, unsafe HTML, large files, migrations, routes, configs."
    - "Compared visible repo capability against official/current public docs for Salesforce Marketing Cloud Engagement, Adobe Journey Optimizer, Braze, Klaviyo, Iterable, and Customer.io."
  limitation:
    - "This is code-proven audit plus targeted line-level review. It excludes generated dependency folders and cannot truthfully certify every runtime path without live production credentials, real provider CIDRs, load evidence, restore drills, and security scans."
    - "Historical migrations were not edited in this audit report; repo rules forbid editing applied migrations blindly."
    - "No secret files were read."

executive_summary:
  release_status: "not production ready"
  top_blockers:
    - id: PRD-001
      severity: P0
      reason: "Production egress policy still inherits broad 0.0.0.0/0 TCP 443 and release validator fails closed; safe replacement needs reviewed CIDRs/FQDN-capable CNI model."
    - id: BE-EVENT-001
      severity: P0
      reason: "Campaign launch gate does not require verified sender domain/DNS/warmup/provider capacity before send orchestration."
    - id: BE-EVENT-002
      severity: P0
      reason: "Delivery rate and warmup reservations are not atomic under concurrent workers."
    - id: AUTH-RBAC-001
      severity: P1
      reason: "Audience/delivery mutating APIs rely mostly on authentication, not least-privilege method RBAC."
    - id: SSO-LINK-001
      severity: P1
      reason: "Federated JIT can attach to existing tenant user by email and rewrite provider binding."
    - id: DB-SCOPE-002
      severity: P1
      reason: "Content and platform ownership remains tenant-only unless product decides these are tenant-global surfaces."
  things_already_hardened_before_this_audit:
    - "Kafka trusted packages narrowed."
    - "Non-test ddl-auto defaults validate."
    - "Audience resolution chunking/keyset paging improved."
    - "Campaign render cache and oversized payload cap added."
    - "Tracking WebSocket auth/workspace handshake added."
    - "Several event consumers now rethrow for retry/DLQ."
  remediation_completed_this_wave:
    - "AUTH-RBAC-001: audience/delivery method-level RBAC added with focused controller tests."
    - "SSO-RBAC-001 and SSO-LINK-001: privileged raw SSO group grants blocked unless mapped, and federation JIT cannot attach native/other-provider users by email fallback."
    - "SCIM-TENANT-001: SCIM user operations are identity-provider bound."
    - "FE-PRD-001 and FE-PRD-006: frontend protected API context enforcement added and SCIM copy failure no longer exposes raw tokens."
    - "CSRF-001: cookie-authenticated unsafe requests without Origin/Referer now fail closed."
    - "TENANT-CTX-001: `t=` tenant query fallback is limited to signed public tracking open/click paths and tenant-free path matching is boundary-aware."
    - "BE-EVENT-001 partial: campaign launch now blocks missing/invalid/mismatched sender/sending-domain alignment; DNS verification, warmup, and provider-capacity checks remain open."
    - "DB-PERF-008 partial: webhook retries now use bounded fetch and claim-before-dispatch; stale RETRYING lease recovery remains open."
    - "Tracking dedupe now includes workspace ID in Redis keys."

