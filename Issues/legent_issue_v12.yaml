      severity: Critical
      category: Docker Build Failure
      layer: Frontend
      module: Build Pipeline
      title: Frontend Docker image build fails during npm production build
      affected_files:
        - frontend/Dockerfile
        - frontend/package.json
        - frontend/package-lock.json
        - frontend/tsconfig.json
        - frontend/next.config.js
        - frontend/src/lib/auth.ts
        - frontend/src/stores/authStore.ts
        - frontend/src/stores/tenantStore.ts
      evidence:
        error_message: |
          target frontend: failed to solve:
          process "/bin/sh -c npm run build"
          did not complete successfully: exit code: 1
      issue_details:
        type: Build Pipeline Failure
        symptoms:
          - Docker compose startup fails
          - Frontend container not created
          - Entire environment startup blocked
        technical_findings:
          - npm build exits with code 1 inside Docker layer
          - TypeScript compile errors exist in auth module imports
          - Missing exported constants break production build
          - Container build uses strict production compilation
      root_cause: |
        Frontend code contains unresolved TypeScript imports introduced during auth module refactor.
        Docker build runs production compilation, which fails on unresolved imports.
      runtime_impact:
        - Docker compose deployment blocked
        - Frontend unavailable
        - Backend cannot be tested end-to-end
      dependency_impact:
        - Local development environment
        - Integration testing
        - CI/CD pipeline
        - Deployment automation
      immediate_fix:
        - Restore missing auth exports
        - Run local npm run build before Docker build
        - Rebuild image after TypeScript errors are resolved
      deep_fix:
        - Add pre-docker validation pipeline
        - Add TypeScript checks in CI before image build
        - Block merge on frontend compile failure
      validation_steps:
        - cd frontend && npm install
        - npm run build
        - docker compose build frontend
        - docker compose up

